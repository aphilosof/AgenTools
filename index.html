/* ===== storage.js ===== */
/* storage.js — localStorage persistence: progress, stars, codex entries,
   theme choice, coach-mode data. Export/import save codes. Versioned schema.

   Phase 1 step 2 scope: the versioned namespace and theme get/set. Progress,
   stars, and codex collections attach to the same state object in later steps. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  var KEY = "codelab.save.v2"; // bump the suffix on a breaking schema change
  // code: { lessonId: lastEditedSource }, solved: { lessonId: true }
  var DEFAULTS = { theme: "magazine", lessonIdx: 0, code: {}, solved: {} };

  function read() {
    try {
      var raw = window.localStorage.getItem(KEY);
      if (!raw) return Object.assign({}, DEFAULTS);
      var parsed = JSON.parse(raw);
      return Object.assign({}, DEFAULTS, parsed);
    } catch (e) {
      // Corrupt or unavailable storage must never break the app.
      return Object.assign({}, DEFAULTS);
    }
  }

  function write(state) {
    try {
      window.localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) {
      /* storage full or disabled: stay in-memory for the session */
    }
  }

  var state = read();

  CL.storage = {
    getTheme: function () {
      return state.theme;
    },
    setTheme: function (theme) {
      state.theme = theme;
      write(state);
    },
    getLessonIdx: function () {
      return state.lessonIdx || 0;
    },
    setLessonIdx: function (idx) {
      state.lessonIdx = idx;
      write(state);
    },
    getCode: function (lessonId) {
      return (state.code && state.code[lessonId]) || null;
    },
    setCode: function (lessonId, code) {
      if (!state.code) state.code = {};
      state.code[lessonId] = code;
      write(state);
    },
    isSolved: function (lessonId) {
      return !!(state.solved && state.solved[lessonId]);
    },
    markSolved: function (lessonId) {
      if (!state.solved) state.solved = {};
      state.solved[lessonId] = true;
      write(state);
    },
    // Wipe saved progress + edited code (keeps the theme choice). For the
    // "restart course" control and testing a fresh run.
    reset: function () {
      state = { theme: state.theme, lessonIdx: 0, code: {}, solved: {} };
      write(state);
    },
    // Escape hatch for later steps and debugging; returns a copy.
    snapshot: function () {
      return Object.assign({}, state);
    },
  };
})();


/* ===== runtime-python.js ===== */
/* runtime-python.js — Pyodide lifecycle: lazy load, stdout/stderr capture,
   execution timeouts, registering the music/turtle/plot bridge modules so
   student code can `from music import play, sleep`.

   Architecture (Stage 1A spike 1, proven in spike/runtime-spike.html): Pyodide
   runs in a Web Worker spawned from a Blob URL — direct file:// workers are
   blocked, but a Blob worker is allowed and importScripts pulls Pyodide from the
   CDN. A runaway loop is killed by terminating the worker and re-initialising;
   the page never freezes. SharedArrayBuffer interrupts are not usable on file://.

   The music/turtle/plot bridges and the stepper (sys.settrace in the worker)
   attach here in later steps. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  // Worker source as a line array (no escaping headaches); becomes a Blob.
  // The PRELUDE installs the Sonic Pi-style music bridge as builtins so student
  // code can call play/sleep/etc. without imports. The functions record timed
  // events on a virtual clock (lists/tuples, to avoid quote-nesting in dicts):
  //   _clock = [t_seconds, tempo_bpm]
  //   event  = ('play', note, durSeconds, atSeconds) | ('sample', name, atSeconds)
  // After each run the event list is handed to the main thread for Web Audio.
  var WORKER_SRC = [
    "importScripts('https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.js');",
    "let pyodide = null;",
    "var PRELUDE = [",
    "  'import builtins',",
    "  '_events = []',",
    "  '_clock = [0.0, 120.0]',",
    "  'def set_tempo(bpm):',",
    "  '    _clock[1] = float(bpm)',",
    "  'def sleep(beats=1.0):',",
    "  '    _clock[0] += float(beats) * (60.0 / _clock[1])',",
    "  'def play(note, dur=0.4):',",
    "  \"    _events.append(('play', float(note), float(dur), _clock[0]))\",",
    "  'def sample(name):',",
    "  \"    _events.append(('sample', str(name), _clock[0]))\",",
    "  'def play_pattern(notes, gap=0.5):',",
    "  '    for _n in notes:',",
    "  '        play(_n)',",
    "  '        sleep(gap)',",
    "  'def forward(d):',",
    "  \"    _events.append(('t_forward', float(d)))\",",
    "  'def backward(d):',",
    "  \"    _events.append(('t_back', float(d)))\",",
    "  'def left(a):',",
    "  \"    _events.append(('t_left', float(a)))\",",
    "  'def right(a):',",
    "  \"    _events.append(('t_right', float(a)))\",",
    "  'def penup():',",
    "  \"    _events.append(('t_penup',))\",",
    "  'def pendown():',",
    "  \"    _events.append(('t_pendown',))\",",
    "  'def pencolor(c):',",
    "  \"    _events.append(('t_color', str(c)))\",",
    "  'def goto(x, y):',",
    "  \"    _events.append(('t_goto', float(x), float(y)))\",",
    "  'def home():',",
    "  \"    _events.append(('t_home',))\",",
    "  'def plot(xs, ys=None):',",
    "  \"    _events.append(('plot', list(xs), (list(ys) if ys is not None else None)))\",",
    "  'def bar(labels, values):',",
    "  \"    _events.append(('bar', [str(_l) for _l in labels], [float(_v) for _v in values]))\",",
    "  'def dotplot(xs, ys=None):',",
    "  \"    _events.append(('dotplot', list(xs), (list(ys) if ys is not None else None)))\",",
    "  'def piano_roll(notes, starts, durations):',",
    "  \"    _events.append(('piano_roll', [int(_n) for _n in notes], [float(_s) for _s in starts], [float(_d) for _d in durations]))\",",
    "  'for _f in (set_tempo, sleep, play, sample, play_pattern, forward, backward, left, right, penup, pendown, pencolor, goto, home, plot, bar, dotplot, piano_roll):',",
    "  '    setattr(builtins, _f.__name__, _f)',",
    // Mock input(): consumes from a queue pre-loaded per run so student code using
    // input() works in exercises without blocking the worker on real stdin.
    "  '_input_queue = []',",
    "  'def input(prompt=\"\"):',",
    "  '    if prompt:',",
    "  '        print(prompt, end=\"\", flush=True)',",
    "  '    if _input_queue:',",
    "  '        return str(_input_queue.pop(0))',",
    "  '    return \"\"',",
    "  'setattr(builtins, \"input\", input)',",
    // Stepper: sys.settrace records (line, locals) at each executed line of the
    // student's code (filename '<student>'), capped, for trace-then-scrub.
    "  'import sys',",
    "  'import linecache',",
    "  'import traceback as _tb',",
    "  '_steps = []',",
    "  '_err = [None]',",
    "  '_STEP_MAX = 500',",
    "  'def _snapshot(frame):',",
    "  '    loc = {}',",
    "  '    for _k, _v in list(frame.f_locals.items()):',",
    "  \"        if _k.startswith('__'):\",",
    "  '            continue',",
    "  '        try:',",
    "  '            _r = repr(_v)',",
    "  '        except Exception:',",
    "  \"            _r = '<?>'\",",
    "  '        if len(_r) > 200:',",
    "  \"            _r = _r[:200] + '...'\",",
    "  '        loc[_k] = _r',",
    "  '    return (frame.f_lineno, loc)',",
    "  'def _tracer(frame, event, arg):',",
    "  \"    if frame.f_code.co_filename != '<student>':\",",
    "  '        return _tracer',",
    "  \"    if event == 'line' and len(_steps) < _STEP_MAX:\",",
    "  '        _steps.append(_snapshot(frame))',",
    "  '    return _tracer',",
    "  'def _run_traced(src):',",
    "  \"    linecache.cache['<student>'] = (len(src), None, src.splitlines(keepends=True), '<student>')\",",
    "  '    sys.settrace(_tracer)',",
    "  '    try:',",
    "  \"        exec(compile(src, '<student>', 'exec'), {'__name__': '__main__'})\",",
    "  '    except BaseException as _e:',",
    "  \"        _frames = [_f for _f in _tb.extract_tb(_e.__traceback__) if _f.filename == '<student>']\",",
    "  \"        _head = ('Traceback (most recent call last):' + chr(10)) if _frames else ''\",",
    "  '        _err[0] = _head + str().join(_tb.format_list(_frames)) + str().join(_tb.format_exception_only(type(_e), _e))',",
    "  '    finally:',",
    "  '        sys.settrace(None)',",
    "].join('\\n');",
    "async function init() {",
    "  pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.29.4/full/' });",
    "  pyodide.setStdout({ batched: function (s) { postMessage({ type: 'stdout', text: s }); } });",
    "  pyodide.setStderr({ batched: function (s) { postMessage({ type: 'stderr', text: s }); } });",
    "  await pyodide.runPythonAsync(PRELUDE);",
    "  postMessage({ type: 'ready' });",
    "}",
    "init().catch(function (e) { postMessage({ type: 'fatal', text: String(e) }); });",
    "onmessage = async function (e) {",
    "  if (e.data.type === 'run') {",
    "    try {",
    "      await pyodide.runPythonAsync('_events.clear(); _clock[0] = 0.0; _steps.clear(); _err[0] = None; _input_queue.clear()');",
    "      if (e.data.mockInput && e.data.mockInput.length) { pyodide.globals.set('_input_queue', e.data.mockInput); }",
    "      pyodide.globals.set('_src', e.data.code);",
    "      await pyodide.runPythonAsync('_run_traced(_src)');",
    "      var erp = pyodide.globals.get('_err'); var er = erp.toJs(); erp.destroy();",
    "      if (er && er[0]) {",
    "        postMessage({ type: 'error', text: er[0] });",
    "      } else {",
    "        var evp = pyodide.globals.get('_events'); var ev = evp.toJs(); evp.destroy();",
    "        var stp = pyodide.globals.get('_steps'); var st = stp.toJs({ dict_converter: Object.fromEntries }); stp.destroy();",
    "        postMessage({ type: 'events', events: ev });",
    "        postMessage({ type: 'steps', steps: st });",
    "      }",
    "      postMessage({ type: 'done' });",
    "    } catch (err) { postMessage({ type: 'error', text: String(err && err.message ? err.message : err) }); }",
    "  }",
    "};",
  ].join("\n");

  var worker = null;
  var blobUrl = null;
  var status = "idle"; // idle | loading | ready | running | error
  var statusCbs = [];
  var readyResolvers = [];
  var readyRejectors = [];
  var loadError = null;
  var activeRun = null; // { onStdout, onStderr, resolve }

  function setStatus(s) {
    status = s;
    statusCbs.forEach(function (cb) { cb(s); });
  }

  function finishRun(result) {
    var run = activeRun;
    activeRun = null;
    if (status === "running") setStatus("ready");
    if (run && run.resolve) run.resolve(result);
  }

  function failLoad(msg) {
    loadError = msg;
    if (worker) { worker.terminate(); worker = null; }
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    setStatus("error");
    var rj = readyRejectors.splice(0);
    readyResolvers.splice(0);
    rj.forEach(function (fn) { fn(new Error(msg)); });
  }

  function spawn() {
    if (worker) worker.terminate();
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    blobUrl = URL.createObjectURL(new Blob([WORKER_SRC], { type: "application/javascript" }));
    worker = new Worker(blobUrl);
    setStatus("loading");
    var initTimeout = setTimeout(function () {
      if (status === "loading") {
        failLoad("Python timed out loading (30 s). Your browser may be blocking network requests from local files — try opening in Chrome or Firefox, or use a local server.");
      }
    }, 30000);
    worker.onmessage = function (e) {
      var m = e.data;
      if (m.type === "ready") {
        clearTimeout(initTimeout);
        setStatus("ready");
        var rs = readyResolvers.splice(0);
        readyRejectors.splice(0);
        rs.forEach(function (r) { r(); });
      } else if (m.type === "stdout") {
        if (activeRun && activeRun.onStdout) activeRun.onStdout(m.text);
      } else if (m.type === "stderr") {
        if (activeRun && activeRun.onStderr) activeRun.onStderr(m.text);
      } else if (m.type === "events") {
        if (activeRun && activeRun.onEvents) activeRun.onEvents(m.events);
      } else if (m.type === "steps") {
        if (activeRun && activeRun.onSteps) activeRun.onSteps(m.steps);
      } else if (m.type === "done") {
        finishRun({ ok: true });
      } else if (m.type === "error") {
        finishRun({ ok: false, error: m.text });
      } else if (m.type === "fatal") {
        clearTimeout(initTimeout);
        failLoad("Could not load Python: " + m.text);
      }
    };
    worker.onerror = function (ev) {
      clearTimeout(initTimeout);
      failLoad("Python worker failed to start: " + (ev.message || "unknown error") + ". Try Chrome or Firefox.");
    };
  }

  function ensureReady() {
    return new Promise(function (resolve, reject) {
      if (status === "ready") return resolve();
      if (status === "error") return reject(new Error(loadError || "Python failed to load"));
      readyResolvers.push(resolve);
      readyRejectors.push(reject);
      if (!worker) spawn();
    });
  }

  CL.runtime = CL.runtime || {};
  CL.runtime.python = {
    ensureReady: ensureReady,
    getStatus: function () { return status; },
    onStatus: function (cb) { statusCbs.push(cb); cb(status); },
    // Run student code. opts.onStdout/onStderr receive text chunks as they print.
    run: function (code, opts) {
      opts = opts || {};
      return ensureReady().then(function () {
        return new Promise(function (resolve) {
          activeRun = { onStdout: opts.onStdout, onStderr: opts.onStderr, onEvents: opts.onEvents, onSteps: opts.onSteps, resolve: resolve };
          setStatus("running");
          worker.postMessage({ type: "run", code: code, mockInput: opts.mockInput || [] });
        });
      }).catch(function (e) {
        return { ok: false, error: String(e.message || e) };
      });
    },
    // Kill a runaway loop and bring Python back to ready.
    stop: function () {
      finishRun({ ok: false, error: "stopped" });
      spawn();
      return ensureReady();
    },
  };
})();


/* ===== runtime-js.js ===== */
/* runtime-js.js — student JavaScript execution in a Blob Worker.
   Interface matches CL.runtime.python exactly so engine.js richRun() treats
   both runtimes identically.

   Infinite-loop protection: main thread sets an 8-second timeout; if the
   worker hasn't posted 'done' by then we terminate and respawn it. The worker
   never freezes the page.

   Bridge functions (play/sleep/turtle/plot) are globals in the worker and
   record the same event array format as the Python bridge:
     ['play', midiNote, durSeconds, atSeconds]
     ['t_forward', dist] etc.
   After each run the event list is sent to the main thread. CL.music,
   CL.turtle, and CL.plot then render from those events — exactly as they do
   for Python runs. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  var WORKER_SRC = [
    // Virtual-clock bridge — identical surface to Python bridge.
    "var _events = [], _clock = [0.0, 120.0];",
    "function set_tempo(bpm) { _clock[1] = parseFloat(bpm); }",
    "function sleep(beats) { _clock[0] += (beats === undefined ? 1.0 : parseFloat(beats)) * (60.0 / _clock[1]); }",
    "function play(note, dur) { _events.push(['play', parseFloat(note), parseFloat(dur === undefined ? 0.4 : dur), _clock[0]]); }",
    "function sample(name) { _events.push(['sample', String(name), _clock[0]]); }",
    "function play_pattern(notes, gap) { gap = gap === undefined ? 0.5 : parseFloat(gap); for (var _i = 0; _i < notes.length; _i++) { play(notes[_i]); sleep(gap); } }",
    "function forward(d) { _events.push(['t_forward', parseFloat(d)]); }",
    "function backward(d) { _events.push(['t_back', parseFloat(d)]); }",
    "function left(a) { _events.push(['t_left', parseFloat(a)]); }",
    "function right(a) { _events.push(['t_right', parseFloat(a)]); }",
    "function penup() { _events.push(['t_penup']); }",
    "function pendown() { _events.push(['t_pendown']); }",
    "function pencolor(c) { _events.push(['t_color', String(c)]); }",
    "function goto_(x, y) { _events.push(['t_goto', parseFloat(x), parseFloat(y)]); }",
    "function home() { _events.push(['t_home']); }",
    "function plot(xs, ys) { _events.push(['plot', Array.from(xs).map(Number), ys ? Array.from(ys).map(Number) : null]); }",
    "function bar(labels, values) { _events.push(['bar', Array.from(labels).map(String), Array.from(values).map(Number)]); }",
    "function dotplot(xs, ys) { _events.push(['dotplot', Array.from(xs).map(Number), ys ? Array.from(ys).map(Number) : null]); }",
    "function piano_roll(notes, starts, durations) { _events.push(['piano_roll', Array.from(notes).map(Number), Array.from(starts).map(Number), Array.from(durations).map(Number)]); }",
    // Capture console.log → stdout, console.error → stderr.
    "var _log = console.log, _err = console.error;",
    "console.log = function() { postMessage({ type: 'stdout', text: Array.prototype.slice.call(arguments).map(String).join(' ') + '\\n' }); };",
    "console.error = function() { postMessage({ type: 'stderr', text: Array.prototype.slice.call(arguments).map(String).join(' ') + '\\n' }); };",
    // Run handler: reset state, execute, report.
    "onmessage = function(e) {",
    "  if (e.data.type !== 'run') return;",
    "  _events = []; _clock = [0.0, 120.0];",
    "  var runErr = null;",
    "  try { (new Function(e.data.code))(); }",
    "  catch(ex) { runErr = String(ex); }",
    "  if (runErr) { postMessage({ type: 'error', text: runErr }); }",
    "  else { postMessage({ type: 'events', events: _events }); }",
    "  postMessage({ type: 'done' });",
    "};",
  ].join("\n");

  var worker = null;
  var blobUrl = null;
  var activeRun = null;
  var runTimeout = null;
  var RUN_TIMEOUT_MS = 8000;

  function clearRunTimeout() {
    if (runTimeout !== null) { clearTimeout(runTimeout); runTimeout = null; }
  }

  function finishRun(result) {
    clearRunTimeout();
    var run = activeRun;
    activeRun = null;
    if (run && run.resolve) run.resolve(result);
  }

  function spawn() {
    if (worker) worker.terminate();
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    blobUrl = URL.createObjectURL(new Blob([WORKER_SRC], { type: "application/javascript" }));
    worker = new Worker(blobUrl);
    worker.onmessage = function (e) {
      var m = e.data;
      if (m.type === "stdout") {
        if (activeRun && activeRun.onStdout) activeRun.onStdout(m.text);
      } else if (m.type === "stderr") {
        if (activeRun && activeRun.onStderr) activeRun.onStderr(m.text);
      } else if (m.type === "events") {
        if (activeRun && activeRun.onEvents) activeRun.onEvents(m.events);
      } else if (m.type === "done") {
        finishRun({ ok: true });
      } else if (m.type === "error") {
        finishRun({ ok: false, error: m.text });
      }
    };
    worker.onerror = function (ev) {
      finishRun({ ok: false, error: "Worker error: " + (ev.message || "") });
    };
  }

  // Pre-create so the first run doesn't pay the Blob-URL setup cost.
  spawn();

  CL.runtime = CL.runtime || {};
  CL.runtime.js = {
    run: function (code, opts) {
      opts = opts || {};
      if (!worker) spawn();
      return new Promise(function (resolve) {
        activeRun = {
          onStdout: opts.onStdout,
          onStderr: opts.onStderr,
          onEvents: opts.onEvents,
          resolve: resolve,
        };
        runTimeout = setTimeout(function () {
          finishRun({ ok: false, error: "Timed out — is there an infinite loop?" });
          spawn();
        }, RUN_TIMEOUT_MS);
        worker.postMessage({ type: "run", code: code });
      });
    },
    stop: function () {
      finishRun({ ok: false, error: "stopped" });
      spawn();
      return Promise.resolve();
    },
  };
})();


/* ===== music.js ===== */
/* music.js — the Sonic Pi-style engine on Web Audio: play, sleep,
   play_pattern, sample, set_tempo. Virtual-timeline scheduler (sleep advances
   logical time; playback scheduled after run). Records the call sequence for
   check.type === "calls". Identical surface for Python (via bridge) and JS.

   Division of labour: the play/sleep/sample functions live in the Pyodide
   worker (see runtime-python.js), where they record timed events on a virtual
   clock. After a run, that event list is handed here and scheduled on Web Audio
   in real time. Events are tuples from Python:
     ['play', midiNote, durSeconds, atSeconds]
     ['sample', name, atSeconds]
   The AudioContext must be unlock()ed inside the run click (a user gesture). */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  var ctx = null;

  function ensureCtx() {
    if (!ctx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    }
    if (ctx.state === "suspended" && ctx.resume) ctx.resume();
    return ctx;
  }

  function midiToFreq(note) {
    return 440 * Math.pow(2, (note - 69) / 12);
  }

  function playTone(ac, freq, at, dur) {
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    var rel = Math.max(0.08, dur);
    gain.gain.setValueAtTime(0.0001, at);
    gain.gain.linearRampToValueAtTime(0.25, at + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, at + rel);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(at);
    osc.stop(at + rel + 0.03);
  }

  function playSample(ac, at, name) {
    if (name === "kick") {
      var osc = ac.createOscillator();
      var g = ac.createGain();
      osc.frequency.setValueAtTime(150, at);
      osc.frequency.exponentialRampToValueAtTime(50, at + 0.12);
      g.gain.setValueAtTime(0.7, at);
      g.gain.exponentialRampToValueAtTime(0.001, at + 0.15);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(at);
      osc.stop(at + 0.16);
      return;
    }
    // snare / hat / anything else: a short shaped noise burst
    var dur = name === "snare" ? 0.18 : 0.06;
    var len = Math.floor(ac.sampleRate * dur);
    var buf = ac.createBuffer(1, len, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
    var src = ac.createBufferSource();
    src.buffer = buf;
    var gain = ac.createGain();
    gain.gain.value = 0.35;
    src.connect(gain);
    gain.connect(ac.destination);
    src.start(at);
  }

  CL.music = {
    midiToFreq: midiToFreq,
    // Create/resume the AudioContext. Call this synchronously inside a user
    // gesture (the run click) so later scheduling is allowed to make sound.
    unlock: function () { ensureCtx(); },
    schedule: function (events) {
      if (!events || !events.length) return;
      var ac = ensureCtx();
      if (!ac) return;
      var t0 = ac.currentTime + 0.06;
      events.forEach(function (e) {
        if (e[0] === "play") playTone(ac, midiToFreq(e[1]), t0 + (e[3] || 0), e[2] || 0.4);
        else if (e[0] === "sample") playSample(ac, t0 + (e[2] || 0), e[1]);
      });
    },
  };
})();


/* ===== turtle.js ===== */
/* turtle.js — canvas turtle matching the standard module's core commands
   (forward, back, left, right, penup, pendown, pencolor, goto, speed).
   Records call sequences for checking. Exposed to Python via the bridge.

   Like the music engine, the commands run in the Pyodide worker and record
   events; this module replays them onto a canvas. Events (tuples from Python):
     ('t_forward', dist) ('t_back', dist) ('t_left', deg) ('t_right', deg)
     ('t_penup',) ('t_pendown',) ('t_color', name) ('t_goto', x, y) ('t_home',)
   Heading 0 = east, angles increase counter-clockwise, y points up (standard
   turtle), origin at canvas center. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  function tok(name, fallback) {
    var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  CL.turtle = {
    render: function (canvas, cmds) {
      var ctx = canvas.getContext("2d");
      var W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = tok("--panel", "#fff");
      ctx.fillRect(0, 0, W, H);

      var x = W / 2, y = H / 2, heading = 0, pen = true, color = tok("--text", "#000");
      ctx.lineWidth = 2;
      ctx.lineCap = "round";

      function moveTo(nx, ny) {
        if (pen) {
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(nx, ny);
          ctx.strokeStyle = color;
          ctx.stroke();
        }
        x = nx;
        y = ny;
      }

      cmds.forEach(function (c) {
        var k = c[0];
        if (k === "t_forward" || k === "t_back") {
          var d = c[1] * (k === "t_back" ? -1 : 1);
          var r = (heading * Math.PI) / 180;
          moveTo(x + d * Math.cos(r), y - d * Math.sin(r));
        } else if (k === "t_left") {
          heading += c[1];
        } else if (k === "t_right") {
          heading -= c[1];
        } else if (k === "t_penup") {
          pen = false;
        } else if (k === "t_pendown") {
          pen = true;
        } else if (k === "t_color") {
          color = c[1];
        } else if (k === "t_goto") {
          moveTo(W / 2 + c[1], H / 2 - c[2]);
        } else if (k === "t_home") {
          moveTo(W / 2, H / 2);
          heading = 0;
        }
      });
    },
  };
})();


/* ===== plot.js ===== */
/* plot.js — tiny chart helper: plot(xs, ys), dotplot(xs, ys), and
   bar(labels, values) drawing to canvas, themed via CSS custom properties.
   Records calls for checking. Mirrored Python/JS surface.

   Commands run in the Pyodide worker and record events; this module draws the
   most recent chart onto the canvas. Events (tuples from Python):
     ('plot', xs, ys|null)     — line chart with a connecting line + dots;
                                  if ys is null, xs is plotted vs index. Use
                                  for sequential/trend data where connecting
                                  the points is meaningful (time, order).
     ('dotplot', xs, ys|null) — dots only, no connecting line. Use for
                                  paired/unordered comparisons where a line
                                  would wrongly imply a trend between points.
     ('bar', labels, values)   — bar chart, for categorical comparisons
     ('piano_roll', notes, starts, durations)
                               — each note a block: pitch up the y-axis (MIDI),
                                  time across the x-axis. starts[i]/durations[i]
                                  give the block's left edge and width. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  function tok(name, fallback) {
    var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }
  function maxOf(arr, floor) { return Math.max.apply(null, arr.concat([floor])); }
  function minOf(arr, ceil)  { return Math.min.apply(null, arr.concat([ceil])); }

  function niceNum(v) {
    if (v === 0) return "0";
    if (Math.abs(v) >= 1000) return (v / 1000).toFixed(1).replace(/\.0$/, "") + "k";
    if (Number.isInteger(v)) return String(v);
    return v.toFixed(1);
  }

  function drawYTicks(ctx, pad, H, minV, maxV, axis, txt) {
    var range = maxV - minV || 1;
    ctx.textAlign = "right";
    ctx.fillStyle = txt;
    for (var t = 0; t <= 4; t++) {
      var v   = minV + range * t / 4;
      var yp  = (H - pad) - (v - minV) / range * (H - pad - pad / 2);
      ctx.fillText(niceNum(v), pad - 5, yp + 4);
      ctx.strokeStyle = axis;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(pad - 3, yp);
      ctx.lineTo(pad, yp);
      ctx.stroke();
    }
  }

  CL.plot = {
    render: function (canvas, cmds) {
      var ctx = canvas.getContext("2d");
      var W = canvas.width, H = canvas.height, pad = 38;
      var axis = tok("--muted", "#888"), accent = tok("--accent", "#c0392b"), txt = tok("--text", "#000");
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = tok("--panel", "#fff");
      ctx.fillRect(0, 0, W, H);
      ctx.font = "11px monospace";

      // axis lines
      ctx.strokeStyle = axis;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, pad / 2);
      ctx.lineTo(pad, H - pad);
      ctx.lineTo(W - pad / 2, H - pad);
      ctx.stroke();

      var cmd = cmds[cmds.length - 1];
      if (!cmd) return;

      if (cmd[0] === "bar") {
        var labels = cmd[1], vals = cmd[2];
        var max = maxOf(vals, 1), n = vals.length || 1;
        var slot = (W - pad - pad / 2) / n;

        drawYTicks(ctx, pad, H, 0, max, axis, txt);

        vals.forEach(function (v, i) {
          var bh = (v / max) * (H - pad - pad / 2);
          var bx = pad + i * slot + slot * 0.15;
          var bw = slot * 0.7;
          ctx.fillStyle = accent;
          ctx.fillRect(bx, H - pad - bh, bw, bh);
          ctx.fillStyle = txt;
          ctx.textAlign = "left";
          ctx.fillText(String(labels[i]), bx, H - pad + 13);
        });

      } else if (cmd[0] === "piano_roll") {
        // note blocks: pitch (MIDI) up the y-axis, time across the x-axis
        var notes = cmd[1], starts = cmd[2], durs = cmd[3];
        var ends = notes.map(function (_, i) { return (starts[i] || 0) + (durs[i] || 0); });
        var maxT = maxOf(ends, 1);
        // pad the pitch range by a semitone each side so edge blocks aren't flush to the axes
        var loP = minOf(notes, notes[0] !== undefined ? notes[0] : 0) - 1;
        var hiP = maxOf(notes, notes[0] !== undefined ? notes[0] : 0) + 1;
        var rangeP = hiP - loP || 1, rangeT = maxT || 1;
        var plotH = H - pad - pad / 2;
        function pxT(t) { return pad + (t / rangeT) * (W - pad - pad / 2); }
        function pyP(p) { return (H - pad) - (p - loP) / rangeP * plotH; }

        drawYTicks(ctx, pad, H, loP, hiP, axis, txt);

        // time tick labels along the x-axis (4 divisions), matching drawYTicks' style
        ctx.textAlign = "center";
        for (var tt = 0; tt <= 4; tt++) {
          var tv = maxT * tt / 4;
          var tx = pxT(tv);
          ctx.fillStyle = txt;
          ctx.fillText(niceNum(tv), tx, H - pad + 13);
          ctx.strokeStyle = axis;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(tx, H - pad);
          ctx.lineTo(tx, H - pad + 3);
          ctx.stroke();
        }

        // one block per note; height is a fraction of a pitch row so rows read apart
        var rowH = plotH / rangeP;
        var blockH = Math.max(rowH * 0.7, 3);
        ctx.fillStyle = accent;
        notes.forEach(function (p, i) {
          var x0 = pxT(starts[i] || 0);
          var bw = Math.max(pxT((starts[i] || 0) + (durs[i] || 0)) - x0, 1);
          ctx.fillRect(x0, pyP(p) - blockH / 2, bw, blockH);
        });

      } else {
        // line chart ("plot") or dot-only scatter ("dotplot") — same axes, different marks
        var isDotplot = cmd[0] === "dotplot";
        var xs = cmd[1], ys = cmd[2];
        if (!ys) { ys = xs; xs = xs.map(function (_, i) { return i; }); }
        var maxX = maxOf(xs, xs[0] !== undefined ? xs[0] + 1 : 1);
        var minX = minOf(xs, xs[0] !== undefined ? xs[0] : 0);
        var maxY = maxOf(ys, 1), minY = minOf(ys, 0);
        var rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
        function px(v) { return pad + (v - minX) / rangeX * (W - pad - pad / 2); }
        function py(v) { return (H - pad) - (v - minY) / rangeY * (H - pad - pad / 2); }

        drawYTicks(ctx, pad, H, minY, maxY, axis, txt);

        // x-axis tick labels when ≤ 12 points (avoids crowding on long series)
        if (xs.length <= 12) {
          ctx.textAlign = "center";
          ctx.fillStyle = txt;
          xs.forEach(function (x) {
            var xp = px(x);
            ctx.fillText(niceNum(x), xp, H - pad + 13);
            ctx.strokeStyle = axis;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(xp, H - pad);
            ctx.lineTo(xp, H - pad + 3);
            ctx.stroke();
          });
        }

        // connecting line — only for "plot" (a trend/sequence); a dotplot never
        // implies order or connection between points, so it draws no line at all
        if (!isDotplot) {
          ctx.strokeStyle = accent;
          ctx.lineWidth = 2;
          ctx.beginPath();
          xs.forEach(function (x, i) {
            var X = px(x), Y = py(ys[i]);
            if (i === 0) ctx.moveTo(X, Y);
            else         ctx.lineTo(X, Y);
          });
          ctx.stroke();
        }

        // dots at each data point (both chart types)
        ctx.fillStyle = accent;
        xs.forEach(function (x, i) {
          ctx.beginPath();
          ctx.arc(px(x), py(ys[i]), isDotplot ? 4 : 3, 0, 2 * Math.PI);
          ctx.fill();
        });
      }
    },
  };
})();


/* ===== errors.js ===== */
/* errors.js — the friendly error layer. Translate, never replace: given a real
   Python traceback, produce a plain-language annotation (grade 5-6) keyed to the
   error class and the likely line, while the raw traceback is still shown intact.

   The engine decides whether to display the annotation (full through Chapter 4,
   on-demand Chapter 5-7, off from Real Tools I, never in the Arena). Each entry
   carries a codex id so the Codex errors tab can register what's been met. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  function grab(msg, re, fallback) {
    var m = String(msg).match(re);
    return m ? m[1] : fallback;
  }

  // The 13 error classes a beginner hits most. plain() takes the final
  // traceback line so messages can name the offending value when useful.
  var TABLE = {
    NameError: {
      codex: "err-name", title: "Unknown name",
      plain: function (m) {
        var n = grab(m, /name '([^']+)'/, null);
        return n
          ? 'Python doesn’t know the name "' + n + '". You used it before creating it, or spelled it differently. Check the spelling, or give it a value first.'
          : "Python met a name it doesn’t know. You may have used it before creating it, or misspelled it.";
      },
    },
    SyntaxError: {
      codex: "err-syntax", title: "Can’t read the code",
      plain: function () { return "Python couldn’t understand this line. Look for a missing colon (:), bracket, or quote, or a typo right around the spot it points to."; },
    },
    IndentationError: {
      codex: "err-indent", title: "Spacing problem",
      plain: function () { return "The spaces at the start of the line are off. Lines inside a loop, if, or function must all be indented by the same amount — use 4 spaces."; },
    },
    TabError: {
      codex: "err-indent", title: "Spacing problem",
      plain: function () { return "You mixed tabs and spaces for indentation. Use spaces only — 4 per level."; },
    },
    TypeError: {
      codex: "err-type", title: "Wrong kind of value",
      plain: function () { return "You used a value in a way its type doesn’t allow — for example adding a number to text. You may need int(), str(), or float() to convert it first."; },
    },
    ValueError: {
      codex: "err-value", title: "Wrong value",
      plain: function () { return "The value wasn’t the right kind for that step — like int(\"hello\"), which isn’t a number."; },
    },
    ZeroDivisionError: {
      codex: "err-zerodiv", title: "Divide by zero",
      plain: function () { return "You divided by zero. Nothing can be divided by 0 — check the number you’re dividing by."; },
    },
    IndexError: {
      codex: "err-index", title: "Past the end",
      plain: function () { return "You asked for an item past the end of a list or string. The first item is index 0, so the last one is the length minus 1."; },
    },
    KeyError: {
      codex: "err-key", title: "Missing key",
      plain: function (m) {
        var k = grab(m, /KeyError:\s*(.+)$/, null);
        return "You asked a dictionary for a key" + (k ? " (" + k + ")" : "") + " it doesn’t have. Check the spelling, or add it first.";
      },
    },
    AttributeError: {
      codex: "err-attr", title: "No such thing",
      plain: function () { return "That value doesn’t have the thing you asked for after the dot. Check the spelling, check that the value is the type you think it is, or — for your own objects — check that it was actually set (often in __init__) before this line ran."; },
    },
    ModuleNotFoundError: {
      codex: "err-module", title: "Module not found",
      plain: function (m) {
        var n = grab(m, /named '([^']+)'/, null);
        return "Python couldn’t find a module" + (n ? ' called "' + n + '"' : "") + " to import. Check the name.";
      },
    },
    UnboundLocalError: {
      codex: "err-unbound", title: "Used too early",
      plain: function () { return "Inside a function you used a variable before giving it a value."; },
    },
    RecursionError: {
      codex: "err-recursion", title: "Too deep",
      plain: function () { return "A function kept calling itself with no stopping point, so Python gave up. Make sure there’s a case that stops the calls."; },
    },
  };

  CL.errors = {
    registry: TABLE,
    // The codex ids this layer can translate (for the Codex errors tab / harness).
    codexIds: function () {
      var ids = {};
      Object.keys(TABLE).forEach(function (k) { ids[TABLE[k].codex] = true; });
      return Object.keys(ids);
    },
    // Parse a Python traceback into { type, line, title, codex, plain }.
    // Returns plain:null for an unrecognised error class (still shows the raw
    // traceback; we just don't invent an explanation).
    translate: function (traceback) {
      if (!traceback) return null;
      var text = String(traceback);
      var lines = text.split("\n").filter(function (l) { return l.trim().length; });
      var last = lines.length ? lines[lines.length - 1] : "";
      var tm = last.match(/^([A-Za-z_][A-Za-z0-9_]*)(?::\s*(.*))?$/);
      var type = tm ? tm[1] : null;
      var line = null, lm, re = /File "<student>", line (\d+)/g;
      while ((lm = re.exec(text)) !== null) line = parseInt(lm[1], 10);
      var entry = type && TABLE[type];
      if (!entry) return { type: type, line: line, codex: null, title: null, plain: null };
      return { type: type, line: line, codex: entry.codex, title: entry.title, plain: entry.plain(last) };
    },
  };
})();


/* ===== style.js ===== */
/* style.js — the second feedback channel (separate from correctness). A small
   built-in linter for naming, magic numbers, repeated code, and function length.
   Active from Chapter 5; advisory (never blocks) until Chapter 6+ checkpoints.

   Deliberately conservative — like the correctness checker, it must feel fair,
   so each rule is tuned against false positives in this course's code (note
   numbers, turtle distances, and angles are legitimate one-off literals, so the
   magic-number rule only fires on a literal repeated several times). Pure
   logic, analysed on stripped source (strings and comments removed first).
   Returns [{ rule, line, message }]. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  var MAX_FUNC_LINES = 15; // a def body longer than this is worth splitting
  var REPEAT_MIN = 3; // a line / literal repeated this many times is worth naming
  // single-letter names that are conventional and fine (loops, math, coords)
  var OK_SHORT = { i: 1, j: 1, k: 1, n: 1, x: 1, y: 1, t: 1 };

  // Replace string contents and comments with blanks so they don't trip rules,
  // keeping line numbers intact.
  function stripped(src) {
    var noTriple = src.replace(/'''[\s\S]*?'''|"""[\s\S]*?"""/g, function (m) {
      return m.replace(/[^\n]/g, " ");
    });
    return noTriple
      .split("\n")
      .map(function (line) {
        var out = line.replace(/'[^']*'|"[^"]*"/g, function (m) { return " ".repeat(m.length); });
        var hash = out.indexOf("#");
        if (hash !== -1) out = out.slice(0, hash);
        return out;
      })
      .join("\n");
  }

  function indentOf(line) {
    var m = line.match(/^(\s*)/);
    return m ? m[1].length : 0;
  }

  function checkFunctionLength(lines, findings) {
    for (var i = 0; i < lines.length; i++) {
      if (!/^\s*def\s+\w+\s*\(/.test(lines[i])) continue;
      var base = indentOf(lines[i]);
      var body = 0;
      for (var j = i + 1; j < lines.length; j++) {
        if (lines[j].trim() === "") continue;
        if (indentOf(lines[j]) <= base) break;
        body++;
      }
      if (body > MAX_FUNC_LINES) {
        findings.push({ rule: "function-length", line: i + 1, message: "this function is " + body + " lines — try breaking it into smaller named functions." });
      }
    }
  }

  function checkRepeatedLines(lines, findings) {
    var counts = {};
    lines.forEach(function (line) {
      var t = line.trim();
      if (t.length < 6) return; // skip trivial lines like "else:"
      counts[t] = (counts[t] || 0) + 1;
    });
    Object.keys(counts).forEach(function (t) {
      if (counts[t] >= REPEAT_MIN) {
        var first = 0;
        for (var i = 0; i < lines.length; i++) { if (lines[i].trim() === t) { first = i + 1; break; } }
        findings.push({ rule: "repeated-code", line: first, message: "this line appears " + counts[t] + " times — a loop or a function could remove the repetition." });
      }
    });
  }

  function checkMagicNumbers(text, lines, findings) {
    var counts = {};
    var re = /\b\d+(?:\.\d+)?\b/g, m;
    while ((m = re.exec(text)) !== null) {
      var v = m[0];
      if (v === "0" || v === "1") continue;
      counts[v] = (counts[v] || 0) + 1;
    }
    Object.keys(counts).forEach(function (v) {
      if (counts[v] >= REPEAT_MIN) {
        var first = 0;
        for (var i = 0; i < lines.length; i++) { if (new RegExp("\\b" + v.replace(".", "\\.") + "\\b").test(lines[i])) { first = i + 1; break; } }
        findings.push({ rule: "magic-number", line: first, message: "the number " + v + " appears " + counts[v] + " times — giving it a name (like a variable) makes the code clearer." });
      }
    });
  }

  function checkNaming(lines, findings) {
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      // assignment target (skip ==, <=, >=, != and augmented ops handled by the simple form)
      var am = line.match(/^\s*([A-Za-z_]\w*)\s*=\s*[^=]/);
      var name = am ? am[1] : null;
      if (!name) {
        var fm = line.match(/^\s*for\s+([A-Za-z_]\w*)\s+in\b/);
        name = fm ? fm[1] : null;
        if (fm && (name.length === 1)) continue; // loop counters may be short
      }
      if (!name) continue;
      if (/^[A-Z0-9_]+$/.test(name)) continue; // ALL_CAPS constant is fine
      if (name.length === 1 && !OK_SHORT[name]) {
        findings.push({ rule: "naming", line: i + 1, message: 'the name "' + name + '" is very short — a descriptive name says what it holds.' });
      } else if (/[A-Z]/.test(name)) {
        findings.push({ rule: "naming", line: i + 1, message: 'use lowercase_with_underscores for "' + name + '" (Python style).' });
      }
    }
  }

  CL.style = {
    analyze: function (src) {
      var findings = [];
      if (!src) return findings;
      var text = stripped(src);
      var lines = text.split("\n");
      checkFunctionLength(lines, findings);
      checkRepeatedLines(lines, findings);
      checkMagicNumbers(text, lines, findings);
      checkNaming(lines, findings);
      findings.sort(function (a, b) { return a.line - b.line; });
      return findings;
    },
  };
})();


/* ===== checker.js ===== */
/* checker.js — tolerant correctness checking (the first feedback channel).
   Given a lesson's check spec and a run result ({ stdout, events }), decide
   pass/fail and always return diagnostics — never a bare fail (PLAN §3).

   Implemented now: check.type "output" (whitespace-normalized line compare with
   a first-difference diagnostic) and "calls" (the recorded music/turtle/plot
   sequence, matched tolerantly with a which-step diagnostic). check.type "tests"
   and "parsons" are recognised but not graded yet (return ungraded:true) — they
   arrive with the test-runner and the Parsons UI. Pure logic, unit-testable. */

(function () {
  "use strict";
  var CL = (window.CL = window.CL || {});

  function normOut(s) {
    return String(s == null ? "" : s)
      .replace(/\r/g, "")
      .split("\n")
      .map(function (l) { return l.replace(/\s+$/, ""); })
      .join("\n")
      .replace(/^\n+/, "")
      .replace(/\n+$/, "");
  }

  function checkOutput(expected, got) {
    var e = normOut(expected), g = normOut(got);
    if (e === g) return { pass: true, diagnostics: ["Correct — your output matches what was expected."] };
    if (g === "") {
      return { pass: false, diagnostics: ["Your program didn’t print anything yet.", "It should print:", "  " + e.split("\n").join(" / ")] };
    }
    var el = e.split("\n"), gl = g.split("\n"), n = Math.max(el.length, gl.length), diags = [];
    for (var i = 0; i < n; i++) {
      if ((el[i] || "") !== (gl[i] || "")) {
        diags.push("Line " + (i + 1) + " of the output isn’t right yet:");
        diags.push("  expected:    " + (el[i] === undefined ? "(no more lines)" : JSON.stringify(el[i])));
        diags.push("  you printed: " + (gl[i] === undefined ? "(no more lines)" : JSON.stringify(gl[i])));
        break;
      }
    }
    if (!diags.length) diags.push("Your output is close but doesn’t match exactly.");
    return { pass: false, diagnostics: diags };
  }

  // Reduce a recorded event tuple to a comparable {fn, ...args} signature.
  function normCall(e) {
    var k = e[0];
    if (k === "play") return { fn: "play", note: e[1] };
    if (k === "sample") return { fn: "sample", name: e[1] };
    if (k && k.indexOf("t_") === 0) return { fn: k.slice(2), val: e[1] };
    return { fn: k };
  }

  function checkCalls(expected, events) {
    var actual = (events || []).map(normCall);
    if (actual.length < expected.length) {
      return { pass: false, diagnostics: ["So far your code did " + actual.length + " of the " + expected.length + " steps expected. Keep going."] };
    }
    for (var i = 0; i < expected.length; i++) {
      var ex = expected[i], ac = actual[i];
      if (!ac || ac.fn !== ex.fn) {
        return { pass: false, diagnostics: ["Step " + (i + 1) + ": expected a " + ex.fn + "() call here" + (ac ? ", but found " + ac.fn + "()." : ".")] };
      }
      var keys = Object.keys(ex);
      for (var j = 0; j < keys.length; j++) {
        var key = keys[j];
        if (key === "fn") continue;
        if (String(ac[key]) !== String(ex[key])) {
          return { pass: false, diagnostics: ["Step " + (i + 1) + " (" + ex.fn + "): expected " + key + " = " + ex[key] + ", but got " + ac[key] + "."] };
        }
      }
    }
    var diags = ["Correct — the steps match what was expected."];
    if (actual.length > expected.length) diags.push("(You did " + (actual.length - expected.length) + " extra step(s) after — fine if you meant to.)");
    return { pass: true, diagnostics: diags };
  }

  CL.check = {
    run: function (lesson, result) {
      var c = lesson && lesson.check;
      if (!c || !c.type) return { pass: true, diagnostics: ["(this lesson has no check)"], ungraded: true };
      result = result || {};
      if (c.type === "output") return checkOutput(c.expected, result.stdout);
      if (c.type === "calls") return checkCalls(c.calls || [], result.events);
      return { pass: true, diagnostics: ["(this check type isn’t graded yet)"], ungraded: true };
    },
  };
})();


/* ===== codex.js ===== */
/* codex.js — the self-building cheat sheet. Earned-only: it shows entries from
   SOLVED lessons only. Three tabs:
     Skills   — each solved lesson's codex entry (pattern + note), grouped by
                topic, with a back-link to the source lesson.
     Glossary — terms (and definitions) from solved lessons' `glossary`.
     Errors   — error classes met (solved lessons' `errorClasses`), each with the
                plain-language note from the friendly-error layer (CL.errors).

      body.appendChild(search);

      function matches(lesson, q) {
        if (!q) return true;

            });

    var resetB = el("button", "btn ghost", "reset"); actions.appendChild(resetB);
    ep.appendChild(actions);

    var outBox = el("div", "output inpanel-output");
    outBox.appendChild(el("div", "out-line info", "press run to execute your code."));
    ep.appendChild(outBox);
    wrap.appendChild(ep);

    // Hints and model solution sit below the panel
    var hintHost = el("div", "hint-host"); wrap.appendChild(hintHost);
    var modelHost = el("div"); wrap.appendChild(modelHost);

    var hintIdx = 0;
    function showModel() {
      if (modelHost.firstChild || !ex.solution) return;
      var m = el("div", "panel"); m.appendChild(el("div", "panel-header", "model solution"));
      var pre = el("pre", "model-code"); pre.textContent = ex.solution; m.appendChild(pre);
      modelHost.appendChild(m);
    }
    function go(grade) {
      runB.disabled = true; if (checkB) checkB.disabled = true;
      richRun(edv.getValue(), outBox, lesson, ex.mockInput || []).then(function (res) {
        runB.disabled = false; if (checkB) checkB.disabled = false;
        if (grade && res.ok && ex.check && CL.check) {
          var verdict = CL.check.run({ check: ex.check }, { stdout: res.stdout, events: res.events });
          if (verdict.pass) {
            var ln = el("div", "out-line success"); ln.appendChild(el("span", "pass-badge", "PASS")); ln.appendChild(document.createTextNode("  " + (verdict.diagnostics[0] || "Correct!"))); outBox.appendChild(ln);
            showModel(); if (lesson.id) CL.storage.markSolved(lesson.id);
          } else {
            var e1 = el("div", "out-line error"); e1.textContent = "not yet — here’s what to look at:"; outBox.appendChild(e1);
            verdict.diagnostics.forEach(function (d) { var di = el("div", "out-line info"); di.textContent = "  " + d; outBox.appendChild(di); });
          }
        }
      });
    }
    runB.addEventListener("click", function () { go(false); });
    if (checkB) checkB.addEventListener("click", function () { go(true); });
    if (hintB) hintB.addEventListener("click", function () {
      if (hintIdx >= ex.hints.length) return;
      var it = el("div", "hint-item"); it.textContent = "Hint " + (hintIdx + 1) + ": " + ex.hints[hintIdx];
      hintHost.appendChild(it); hintIdx++;

    if (solB) solB.addEventListener("click", showModel);
    resetB.addEventListener("click", function () {
      var fresh = effectiveStarter(ex.starter);
      if (!predict) { edv.setValue(fresh); CL.storage.setCode(key, fresh); }
      if (predBox) predBox.value = "";
      outBox.innerHTML = "";

      hintHost.innerHTML = "";
      modelHost.innerHTML = "";
      hintIdx = 0;
      if (hintB) hintB.disabled = false;
    });
    return wrap;
  }

  // Mount a code editor into host: CodeMirror when present (from CDN), a themed
  // textarea otherwise. Used for both the challenge editor and the worked-example
  // editor; onChange is called with the new value on every edit (may be null).
  function mountEditor(host, code, lang, onChange, readOnly, placeholder) {
    if (window.CodeMirror) {
      var cm = window.CodeMirror(host, {
        value: code,
        mode: lang === "js" ? "javascript" : "python",
        lineNumbers: true,
        indentUnit: 4,
        readOnly: !!readOnly,
        placeholder: placeholder || "",
        viewportMargin: Infinity, // grow to fit content instead of a fixed box
      });
      if (onChange) cm.on("change", function () { onChange(cm.getValue()); });
      // Refresh after the node is in the DOM (rich-section editors mount during
      // render, before insertion) so the code shows instead of a blank box.
      setTimeout(function () { try { cm.refresh(); } catch (e) {} }, 0);
      var lastLine = null;
      return {
        getValue: function () { return cm.getValue(); },
        setValue: function (v) { cm.setValue(v); },
        focus: function () { cm.focus(); },
        highlightLine: function (n) {
          if (lastLine != null) { cm.removeLineClass(lastLine, "background", "cm-stepline"); lastLine = null; }
          if (n != null && n >= 0) {
            cm.addLineClass(n, "background", "cm-stepline");
            lastLine = n;
            cm.scrollIntoView({ line: n, ch: 0 });
          }
        },
      };
    }
    var ta = document.createElement("textarea");
    ta.className = "editor-fallback";
    ta.value = code;
    ta.spellcheck = false;
    ta.readOnly = !!readOnly;
    if (placeholder) ta.placeholder = placeholder;
    if (onChange) ta.addEventListener("input", function () { onChange(ta.value); });
    host.appendChild(ta);
    return { getValue: function () { return ta.value; }, setValue: function (v) { ta.value = v; }, focus: function () { ta.focus(); }, highlightLine: function () {} };
  }

  // Lesson/section navigation: top prev/next, clickable progress circles, and the
  // bottom back/next-section buttons. Shared by the single-exercise and rich paths.
  function wireNav() {
    var lessonPrev = document.getElementById("lesson-prev");
    var lessonNext = document.getElementById("lesson-next");
    if (lessonPrev) { lessonPrev.disabled = state.lessonIdx === 0; lessonPrev.addEventListener("click", function () { setLesson(state.lessonIdx - 1); }); }
    if (lessonNext) { lessonNext.disabled = state.lessonIdx >= state.lessonCount - 1; lessonNext.addEventListener("click", function () { setLesson(state.lessonIdx + 1); }); }
    var cellsEl = document.getElementById("progress-cells");
    if (cellsEl) cellsEl.addEventListener("click", function (e) { var t = e.target.getAttribute && e.target.getAttribute("data-i"); if (t != null) setLesson(parseInt(t, 10)); });
    var fbPrevEl = document.getElementById("lesson-prev-b");
    if (fbPrevEl) fbPrevEl.addEventListener("click", function () { setLesson(state.lessonIdx - 1); });
    var fbNextEl = document.getElementById("lesson-next-b");
    if (fbNextEl) fbNextEl.addEventListener("click", function () { setLesson(state.lessonIdx + 1); });
  }

  function wireRuntime(theme, lesson) {
    // content[] and rich-section lessons self-wire their blocks in render(); only nav needs wiring.
    if (lesson.content || lesson.examples || lesson.exercises) { wireNav(); return; }
    var editor = mountEditor(document.getElementById("editor-host"), state.code, lesson.lang, function (v) {
      state.code = v;
      CL.storage.setCode(state.lesson.id, v);
    }, false, "type your code here…");
    var exHost = document.getElementById("example-host");
    var exEditor = exHost ? mountEditor(exHost, lesson.example || "", lesson.lang, null, true) : null;
    var runBtn = document.getElementById("btn-run");
    var stopBtn = document.getElementById("btn-stop");
    var outBox = document.getElementById("output-box");
    var stage = document.getElementById("stage");
    var canvas = document.getElementById("stage-canvas");
    var stepperEl = document.getElementById("stepper");
    var stepPrev = document.getElementById("step-prev");
    var stepNext = document.getElementById("step-next");
    var stepPos = document.getElementById("step-pos");
    var stepLineEl = document.getElementById("step-line");
    var stepVars = document.getElementById("step-vars");
    var checkBtn = document.getElementById("btn-check");
    var hintBtn = document.getElementById("btn-hint");
    var solBtn = document.getElementById("btn-solution");
    var hintHost = document.getElementById("hint-host");
    var modelHost = document.getElementById("model-host");
    var py = CL.runtime && CL.runtime.python;

    var steps = [];
    var stepIdx = 0;
    var hintIdx = 0;

    var currentOut = outBox; // the example run targets its own printout
    function out(text, cls) {
      var d = el("div", "out-line" + (cls ? " " + cls : ""));
      d.textContent = text;
      currentOut.appendChild(d);
    }

    // Friendly error annotation beneath the raw traceback (translate, never replace).
    function showAnnotation(ann) {
      var box = el("div", "err-annotation");
      var head = el("div", "err-ann-head");
      head.textContent = "💡 " + (ann.title || "What this means") + (ann.line ? "  (line " + ann.line + ")" : "");
      box.appendChild(head);
      var body = el("div", "err-ann-body");
      body.textContent = ann.plain;
      box.appendChild(body);
      outBox.appendChild(box);
    }
    function showErrorWithAnnotation(traceback) {
      out(traceback, "error"); // raw traceback, untouched
      var ann = CL.errors && CL.errors.translate(traceback);
      if (!ann || !ann.plain) return;
      var mode = annotationMode(lesson);
      if (mode === "full") {
        showAnnotation(ann);
      } else if (mode === "ondemand") {
        var btn = el("button", "btn ghost", "explain this error");
        btn.addEventListener("click", function () { btn.remove(); showAnnotation(ann); });
        outBox.appendChild(btn);
      }
    }

    // Style channel — advisory notes after a pass; active from Chapter 5 (PLAN §3).
    function showStyle(findings) {
      var box = el("div", "style-channel");
      box.appendChild(el("div", "style-head", "✎ style notes (optional)"));
      findings.forEach(function (f) {
        var row = el("div", "style-item");
        row.textContent = "line " + f.line + ": " + f.message;
        box.appendChild(row);
      });
      outBox.appendChild(box);
    }

    // ----- stepper (trace-then-scrub over recorded execution steps) -----
    function renderVars(obj) {
      stepVars.innerHTML = "";
      var keys = Object.keys(obj || {});
      if (!keys.length) {
        var tr = el("tr");
        var td = el("td", "var-empty", "(no variables yet)");
        td.colSpan = 2;
        tr.appendChild(td);
        stepVars.appendChild(tr);
        return;
      }
      keys.forEach(function (k) {
        var row = el("tr");
        row.appendChild(el("td", "var-name", escapeHtml(k)));
        row.appendChild(el("td", "var-val", escapeHtml(obj[k])));
        stepVars.appendChild(row);
      });
    }
    function showStep(i) {
      if (!steps.length) return;
      stepIdx = Math.max(0, Math.min(steps.length - 1, i));
      var s = steps[stepIdx]; // [lineNo, {vars}]
      stepPos.textContent = "step " + (stepIdx + 1) + " / " + steps.length;
      stepLineEl.textContent = "about to run line " + s[0];
      renderVars(s[1]);
      editor.highlightLine(s[0] - 1);
      stepPrev.disabled = stepIdx === 0;
      stepNext.disabled = stepIdx === steps.length - 1;
    }
    function initStepper(s) {
      steps = s || [];
      if (!steps.length) { stepperEl.style.display = "none"; return; }
      stepperEl.style.display = "";
      showStep(0);
    }
    stepPrev.addEventListener("click", function () { showStep(stepIdx - 1); });
    stepNext.addEventListener("click", function () { showStep(stepIdx + 1); });

    // Route recorded events to the right renderer and tally what happened.
    function dispatchEvents(events, counts) {
      if (!events || !events.length) return;
      var music = [], turtle = [], plot = [];
      events.forEach(function (e) {
        var k = e[0];
        if (k === "play" || k === "sample") music.push(e);
        else if (k.indexOf("t_") === 0) turtle.push(e);
        else if (k === "plot" || k === "bar" || k === "dotplot") plot.push(e);
      });
      counts.music += music.length;
      counts.turtle += turtle.length;
      counts.plot += plot.length;
      if (music.length && CL.music) CL.music.schedule(music);
      if ((turtle.length || plot.length) && canvas) stage.style.display = "";
      if (turtle.length && CL.turtle) CL.turtle.render(canvas, turtle);
      if (plot.length && CL.plot) CL.plot.render(canvas, plot);
    }
    function setRunning(on) {
      runBtn.disabled = on;
      if (checkBtn) checkBtn.disabled = on;
      stopBtn.style.display = on ? "" : "none";
    }

    // Verdict from the correctness checker (tolerant, always diagnostic).
    function showVerdict(verdict) {
      if (verdict.pass) {
        var line = el("div", "out-line success");
        line.appendChild(el("span", "pass-badge", "PASS"));
        line.appendChild(document.createTextNode("  " + (verdict.diagnostics[0] || "Correct!")));
        outBox.appendChild(line);
        verdict.diagnostics.slice(1).forEach(function (d) { out(d, "info"); });
      } else {
        out("not yet — here’s what to look at:", "error");
        verdict.diagnostics.forEach(function (d) { out("  " + d, "info"); });
      }
    }
    function revealSolution() {
      if (!modelHost || !lesson.solution || document.getElementById("model-sol")) return;
      var box = el("div", "panel");
      box.id = "model-sol";
      box.appendChild(el("div", "panel-header", "model solution"));
      var pre = el("pre", "model-code");
      pre.textContent = lesson.solution;
      box.appendChild(pre);
      modelHost.appendChild(box);
    }
    function showNextHint() {
      if (!hintHost || hintIdx >= lesson.hints.length) return;
      var item = el("div", "hint-item");
      item.textContent = "Hint " + (hintIdx + 1) + ": " + lesson.hints[hintIdx];
      hintHost.appendChild(item);
      hintIdx++;
      if (hintBtn && hintIdx >= lesson.hints.length) hintBtn.disabled = true;
    }

    // Run a program. source!=null means "run the worked example" (no grading,
    // no stepper highlight, which would target the challenge editor). When grade
    // is true, the challenge is checked afterward.
    function execute(grade, source) {
      if (runBtn.disabled) return;
      var isExample = source != null;
      var code = isExample ? source : editor.getValue();
      var exOutBox = document.getElementById("example-output-box");
      currentOut = isExample && exOutBox ? exOutBox : outBox;
      currentOut.innerHTML = "";
      if (stage) stage.style.display = "none";
      stepperEl.style.display = "none";
      editor.highlightLine(null);
      if (!py) { out("runtime unavailable", "error"); return; }
      if (CL.music) CL.music.unlock(); // user gesture: allow sound later
      setRunning(true);
      if (py.getStatus() !== "ready") out("starting Python (the first run downloads it once)…", "info");
      var hadStdout = false;
      var stdoutText = "";
      var allEvents = [];
      var counts = { music: 0, turtle: 0, plot: 0 };
      var capturedSteps = null;
      py.run(code, {
        onStdout: function (s) { hadStdout = true; stdoutText += s; out(s.replace(/\n$/, "")); },
        onStderr: function (s) { hadStdout = true; out(s.replace(/\n$/, ""), "error"); },
        onEvents: function (events) { allEvents = events || []; dispatchEvents(events, counts); },
        onSteps: function (s) { capturedSteps = s; },
      }).then(function (r) {
        setRunning(false);
        if (!isExample) initStepper(capturedSteps); // stepper tracks the challenge editor
        if (!r.ok) {
          if (r.error !== "stopped") showErrorWithAnnotation(r.error || "error");
          return;
        }
        var notes = [];
        if (counts.music) notes.push("♪ played " + counts.music + " sound" + (counts.music > 1 ? "s" : ""));
        if (counts.turtle) notes.push("✏ drew with the turtle");
        if (counts.plot) notes.push("📊 drew a chart");
        if (notes.length) notes.forEach(function (n) { out(n, "success"); });
        else if (!hadStdout) out("done.", "info");
        if (!isExample && grade && lesson.check && CL.check) {
          var verdict = CL.check.run(lesson, { stdout: stdoutText, events: allEvents });
          showVerdict(verdict);
          if (verdict.pass) {
            if (lesson.id) CL.storage.markSolved(lesson.id);
            var cells = document.getElementById("progress-cells");
            if (cells) cells.innerHTML = renderProgress(); // reflect the new solve
            revealSolution(); // model-solution compare on success
          }
        }
        // Second feedback channel: style notes from Chapter 5 onward.
        if (!isExample && CL.style && lesson.chapter >= 5) {
          var findings = CL.style.analyze(editor.getValue());
          if (findings.length) showStyle(findings);
        }
      });
    }
    function doStop() {
      if (!py) return;
      out("stopping…", "info");
      setRunning(false);
      py.stop().then(function () { out("stopped — Python is ready again.", "info"); });
    }

    wireNav();

    var runExBtn = document.getElementById("btn-run-example");
    if (runExBtn && exEditor) runExBtn.addEventListener("click", function () { execute(false, exEditor.getValue()); });

    runBtn.addEventListener("click", function () { execute(false); });
    if (checkBtn) checkBtn.addEventListener("click", function () { execute(true); });
    if (hintBtn) hintBtn.addEventListener("click", showNextHint);
    if (solBtn) solBtn.addEventListener("click", revealSolution);
    var rstBtn2 = document.getElementById("btn-reset");
    if (rstBtn2) rstBtn2.addEventListener("click", function () {
      var starter = state.lesson.starterCode || "";
      editor.setValue(starter);
      state.code = starter;
      CL.storage.setCode(state.lesson.id, starter);
      outBox.innerHTML = "";
      outBox.appendChild(el("div", "out-line info", "press run to execute your code."));
      if (hintHost) hintHost.innerHTML = "";
      if (modelHost) modelHost.innerHTML = "";
      hintIdx = 0;
      if (hintBtn) hintBtn.disabled = false;
      if (stage) stage.style.display = "none";
      stepperEl.style.display = "none";
      editor.highlightLine(null);
      steps = []; stepIdx = 0;
    });
    stopBtn.addEventListener("click", doStop);

    // F5 runs (matches the terminal key-hint). Re-wired each render, so drop the
    // previous handler to avoid stacking.
    if (keydownHandler) document.removeEventListener("keydown", keydownHandler);
    keydownHandler = function (e) {
      if (e.key === "F5") { e.preventDefault(); execute(false); }
    };
    document.addEventListener("keydown", keydownHandler);
  }

  function lessonsList() {
    return (window.CODELAB && window.CODELAB.lessons) || [];
  }
  // Load the lesson at idx (clamped); fall back to the layout demo if there is
  // no authored curriculum yet. Updates the module's lesson index/count.
  function loadLesson(idx) {
    var lessons = lessonsList();
    if (!lessons.length) { state.lessonIdx = 0; state.lessonCount = 1; return DEMO; }
    state.lessonCount = lessons.length;
    state.lessonIdx = Math.max(0, Math.min(lessons.length - 1, idx));
    return adaptLesson(lessons[state.lessonIdx], state.lessonIdx, lessons.length);
  }

  // A starter that is only comments/whitespace is instruction text, not
  // scaffolding — treat it as empty so the editor shows the "type your code
  // here…" placeholder. Real code-to-fix/modify starters are kept as-is.
  function effectiveStarter(s) {
    var t = String(s || "");
    var hasCode = t.split("\n").some(function (ln) {
      var x = ln.trim();
      return x.length && x.charAt(0) !== "#";
    });
    return hasCode ? t : "";
  }

  // Map a schema lesson object onto the fields render() needs. Kept minimal;
  // the full rung handling (parsons, tests) is a later step.
  function adaptLesson(l, idx, total) {
    return {
      id: l.id,
      chapter: l.chapter,
      lessonNo: idx + 1,
      total: total,
      title: l.title,
      challengeCode: "C" + l.chapter + "-1",
      filename: "lesson." + (l.lang === "js" ? "js" : "py"),
      lang: l.lang === "js" ? "js" : l.lang === "none" ? "none" : "py",
      promptTitle: l.title,
      promptText: String(l.explain || "").split(/\n\n+/).filter(function(p) { return p.trim(); }),
      content: l.content || null,
      glossary: l.glossary || null,
      moreInfo: l.moreInfo || null,
      task: l.task || "",
      example: l.example || "",
      exampleNote: l.exampleNote || "",
      examples: l.examples || null,
      exercises: l.exercises || null,
      starterCode: effectiveStarter(l.starter),
      check: l.check || null,
      hints: l.hints || [],
      solution: l.solution || "",
    };
  }

  function setTheme(theme) {
    if (THEMES.indexOf(theme) === -1) theme = "magazine";
    document.documentElement.setAttribute("data-theme", theme);
    CL.storage.setTheme(theme);
    renderAndWire(theme);
  }

  function setLesson(idx) {
    state.view = "lessons";
    state.lesson = loadLesson(idx);
    state.code = CL.storage.getCode(state.lesson.id) || state.lesson.starterCode;
    CL.storage.setLessonIdx(state.lessonIdx);
    renderAndWire(document.documentElement.getAttribute("data-theme") || CL.storage.getTheme());
  }

  // Switch surfaces (Lessons / Map / Sandbox / …). Sandbox is a pseudo-lesson so
  // it reuses the editor + run + stepper machinery; Map renders its own body.
  function setView(view) {
    state.view = unlocked(view) ? view : "lessons";
    state.lesson = state.view === "sandbox" ? sandboxLesson() : loadLesson(state.lessonIdx);
    state.code = CL.storage.getCode(state.lesson.id) || state.lesson.starterCode;
    renderAndWire(document.documentElement.getAttribute("data-theme") || CL.storage.getTheme());
  }

  function init() {
    state.lesson = loadLesson(CL.storage.getLessonIdx());
    state.code = CL.storage.getCode(state.lesson.id) || state.lesson.starterCode;
    setTheme(CL.storage.getTheme());
    if (CL.runtime && CL.runtime.python) CL.runtime.python.ensureReady().catch(function () {});
  }

  CL.engine = { render: render, setTheme: setTheme, setLesson: setLesson, setView: setView };

  // Script is concatenated at the end of <body>, so #app already exists.
  init();
})();


/* ===== capstone-panel.js ===== */
/* capstone-panel.js — always-available Capstone hub (read-only guides).

   Self-contained: injects a fixed "Capstone" button + an accessible modal that
   lists the four guides from window.CODELAB.capstone (setup first as "Start
   here", then the three projects) and renders each as formatted Markdown.
   Self-initialises on DOM ready; does not depend on engine.js.

   engine.js's Markdown renderer (inlineProse) is PRIVATE and inline-only (no
   headers/lists/fences/tables), so per instructions we do NOT edit engine.js to
   export it — a small Markdown subset is rendered locally below. Globbed into
   the build by build.js like every other src/js file. */

(function () {
  "use strict";

  var BT = String.fromCharCode(96); // backtick, kept out of source template literals

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  /* ---- inline markup: escape, then `code`, [text](url), **bold** ---- */
  function inline(t) {
    return esc(t)
      .replace(new RegExp(BT + "([^" + BT + "]+)" + BT, "g"), function (_, c) { return "<code>" + c + "</code>"; })
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, txt, url) {
        return '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + txt + "</a>";
      })
      .replace(/\*\*([^*]+)\*\*/g, function (_, c) { return "<strong>" + c + "</strong>"; })
      .replace(/\*([^*\n]+)\*/g, function (_, c) { return "<em>" + c + "</em>"; });
  }

  function splitRow(l) {
    return l.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(function (c) { return c.trim(); });
  }

  /* ---- local Markdown subset: headers, bold, inline code, fenced code,
     unordered/ordered lists, tables, links, paragraphs ---- */
  function mdToHtml(src) {
    var lines = String(src == null ? "" : src).replace(/\r\n?/g, "\n").split("\n");
    var out = [];
    var i = 0;
    var fenceRe = new RegExp("^" + BT + BT + BT + "(\\w*)\\s*$");
    var fenceEndRe = new RegExp("^" + BT + BT + BT + "\\s*$");

    function isBlockStart(l) {
      return fenceRe.test(l) || /^#{1,6}\s/.test(l) || /^\s*[-*]\s+/.test(l) ||
        /^\s*\d+\.\s+/.test(l) || /^\s*\|.*\|\s*$/.test(l) || /^\s*$/.test(l) ||
        /^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l);
    }

    while (i < lines.length) {
      var line = lines[i];

      var fence = line.match(fenceRe);
      if (fence) {
        var buf = [];
        i++;
        while (i < lines.length && !fenceEndRe.test(lines[i])) { buf.push(lines[i]); i++; }
        i++; // closing fence
        out.push('<pre class="cl-cap-pre"><code>' + esc(buf.join("\n")) + "</code></pre>");
        continue;
      }

      var h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) {
        var lvl = h[1].length;
        out.push("<h" + lvl + ">" + inline(h[2].trim()) + "</h" + lvl + ">");
        i++;
        continue;
      }

      if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) { out.push("<hr>"); i++; continue; }

      if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
        var head = splitRow(line);
        i += 2;
        var rows = [];
        while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(splitRow(lines[i])); i++; }
        var t = '<table class="cl-cap-table"><thead><tr>' +
          head.map(function (c) { return "<th>" + inline(c) + "</th>"; }).join("") + "</tr></thead><tbody>" +
          rows.map(function (r) {
            return "<tr>" + r.map(function (c) { return "<td>" + inline(c) + "</td>"; }).join("") + "</tr>";
          }).join("") + "</tbody></table>";
        out.push(t);
        continue;
      }

      if (/^\s*[-*]\s+/.test(line)) {
        var ul = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
          ul.push("<li>" + inline(lines[i].replace(/^\s*[-*]\s+/, "")) + "</li>");
          i++;
        }
        out.push("<ul>" + ul.join("") + "</ul>");
        continue;
      }

      if (/^\s*\d+\.\s+/.test(line)) {
        var ol = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          ol.push("<li>" + inline(lines[i].replace(/^\s*\d+\.\s+/, "")) + "</li>");
          i++;
        }
        out.push("<ol>" + ol.join("") + "</ol>");
        continue;
      }

      if (/^\s*$/.test(line)) { i++; continue; }

      var para = [];
      while (i < lines.length && !isBlockStart(lines[i])) { para.push(lines[i]); i++; }
      out.push("<p>" + inline(para.join(" ")) + "</p>");
    }
    return out.join("\n");
  }
