/* ===== layout.css ===== */
/* layout.css — the shared layout and component system (DESIGN.md "Shared system").
   Structure, spacing, and component anatomy are identical across themes; only the
   tokens in themes.css and a handful of per-theme signature blocks below change.
   Components reference custom properties only; raw hex appears solely in the
   per-theme signature sections, where DESIGN.md specifies literal values.
   Global rule: flat surfaces only — no gradients, shadows, glows, or blur. */

* { box-sizing: border-box; }

html, body { height: 100%; }
body { margin: 0; }

/* ----- frame + page scaffold ----- */
#frame {
  min-height: 100%;
  border: var(--frame-w, 0px) solid var(--frame);
  background: var(--bg);
}
.app {
  max-width: 880px;
  margin: 0 auto;
  padding: 20px 22px 40px;
}

/* magazine rainbow manual stripe (rendered only in magazine) */
.rainbow-stripe { display: flex; height: 7px; }
.rainbow-stripe > span { flex: 1; }

/* c64 boot header (rendered only in c64) */
#boot-header { text-align: center; padding: 14px 0 4px; }
#boot-header .boot-title {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}
#boot-header .boot-status {
  font-family: var(--font-body);
  font-size: var(--size-body);
  color: var(--text-soft);
  margin-top: 6px;
}

/* terminal status bar (rendered only in terminal) */
#status-bar {
  background: #131D13;
  color: var(--text-soft);
  font-family: var(--font-code);
  font-size: 12px;
  padding: 6px 22px;
  display: flex;
  justify-content: space-between;
}
#status-bar .lang { color: var(--accent); }

/* ----- top bar ----- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-top: 10px;
  padding-bottom: 12px;
  border-bottom: var(--border-w) solid var(--border);
  margin-bottom: 18px;
}
.topbar .title { font-family: var(--font-display); font-size: var(--size-display); color: var(--text); }
.topbar .right { display: flex; align-items: center; gap: 10px; color: var(--muted); font-family: var(--font-code); font-size: var(--size-code); }
.navbtn { font-family: var(--font-code); font-size: 14px; line-height: 1; padding: 2px 9px; border: var(--border-w) solid var(--border); border-radius: var(--radius); background: var(--panel); color: var(--text); cursor: pointer; }
.navbtn:disabled { opacity: 0.35; cursor: default; }

/* progress as discrete cells, never a smooth bar */
.progress { display: inline-flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.progress .cell { width: 10px; height: 10px; border: var(--border-w) solid var(--border); border-radius: var(--radius); }
.progress .cell.done { background: var(--accent); border-color: var(--accent); }
.progress .cell.current { border-color: var(--accent); }
.progress .progress-gap { width: 8px; }

/* ----- app navigation ----- */
.appnav { display: flex; gap: 16px; margin-bottom: 20px; font-family: var(--font-code); font-size: var(--size-code); }
.appnav .tab { color: var(--text-soft); cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
.appnav .tab.active { color: var(--accent); border-bottom-color: var(--accent); cursor: default; }

/* ----- prompt block ----- */
.prompt {
  background: var(--panel);
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 18px;
  color: var(--text);
}
.prompt h2 { margin: 0 0 8px; font-family: var(--font-display); font-size: calc(var(--size-display) * 0.7); }
.prompt p { margin: 0 0 10px; line-height: 1.65; color: var(--text-soft); }
.prompt p:last-child { margin-bottom: 0; }
/* Inline code in prose: monospace + accent color, no background chip.
   Inline code uses its own token (--code-inline) distinct from --accent, which is
   reserved for clickable glossary term links. A faint pill background makes code
   scannable without competing with accent-colored links. */
.prompt code, .example-intro code, .content-text code, .challenge-task code, .hint-item code, .err-ann-body code {
  font-family: var(--font-code);
  font-size: 0.88em;
  color: var(--code-inline);
  background: var(--code-inline-bg);
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
}

/* interleaved content[] text blocks */
.content-text {
  margin: 0 0 12px;
  line-height: 1.45;
  color: var(--text);
}
/* separator line before prose that resumes after an example or exercise panel */
.example-wrap + .content-text,
.exercise-block + .content-text {
  margin-top: 24px;
  padding-top: 16px;
  border-top: var(--border-w) solid var(--border);
}

/* ----- inline reference tables ----- */
.ref-table-wrap { margin: 0 0 16px; }
.ref-table-wrap + .ref-table-wrap { margin-top: -4px; }
.example-wrap + .ref-table-wrap,
.exercise-block + .ref-table-wrap { margin-top: 24px; padding-top: 16px; border-top: var(--border-w) solid var(--border); }
.ref-table-title { font-size: 0.75em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; }
.ref-table { border-collapse: collapse; width: 100%; font-size: 0.84em; border: var(--border-w) solid var(--border); border-radius: var(--radius); overflow: hidden; }
.ref-table th { background: var(--panel-header); color: var(--text); font-weight: 700; font-family: var(--font-code); font-size: 0.95em; padding: 5px 10px; text-align: left; border-bottom: var(--border-w) solid var(--border); }
.ref-table td { padding: 4px 10px; border-bottom: var(--border-w) solid var(--border); color: var(--text); }
.ref-table tr:last-child td { border-bottom: none; }
.ref-table td code { font-family: var(--font-code); font-size: 1em; color: var(--code-inline); }
.ref-table td:first-child { font-family: var(--font-code); color: var(--code-inline); font-weight: 600; }

/* ----- panels (editor, output) ----- */
.panel {
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  background: var(--panel);
  margin-bottom: 16px;
}
.panel-header {
  background: var(--panel-header);
  color: var(--muted);
  font-family: var(--font-code);
  font-size: 12px;
  padding: 6px 12px;
  border-bottom: var(--border-w) solid var(--border);
}

/* stage: canvas for turtle/plot output */
.stage-canvas { display: block; width: 100%; max-width: 480px; height: auto; }

/* stepper: trace-then-scrub through recorded execution */
.stepper-body { padding: 12px; }
.stepper-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.step-pos { font-family: var(--font-code); font-size: 12px; color: var(--muted); }
.step-line { font-family: var(--font-code); font-size: 12px; color: var(--text-soft); margin-bottom: 10px; }
.var-table { border-collapse: collapse; font-family: var(--font-code); font-size: var(--size-code); width: 100%; max-width: 420px; }
.var-table td { border: var(--border-w) solid var(--border); padding: 4px 10px; }
.var-table .var-name { color: var(--accent); }
.var-table .var-val { color: var(--text); }
.var-table .var-empty { color: var(--muted); }
.CodeMirror .cm-stepline { background: var(--panel-header); }

/* editor: CodeMirror, themed from tokens; textarea fallback if the CDN fails.
   CodeMirror brings its own base CSS from the CDN; these rules retint it to the
   active theme and let it grow to fit the code instead of a fixed-height box. */
#editor-host { font-family: var(--font-code); font-size: var(--size-code); }
.CodeMirror {
  height: auto;
  min-height: 84px;
  background: var(--panel);
  color: var(--text);
  font-family: var(--font-code);
  font-size: var(--size-code);
  line-height: 1.45;
}
.CodeMirror-gutters { background: var(--panel-header); border-right: var(--border-w) solid var(--border); }
.CodeMirror-linenumber { color: var(--lineno); }
.CodeMirror-cursor { border-left: 1px solid var(--text); }
.CodeMirror-selected,
.CodeMirror-focused .CodeMirror-selected { background: var(--border); }
/* Identifiers stay base-colored across all themes; only keyword/literal/comment
   are tinted per theme below, so CodeMirror's defaults never clash on dark themes. */
.cm-def, .cm-variable, .cm-variable-2, .cm-property, .cm-operator, .cm-punctuation { color: var(--text); }

.editor-fallback {
  display: block;
  width: 100%;
  box-sizing: border-box;
  min-height: 90px;
  border: none;
  padding: 10px 12px;
  background: var(--panel);
  color: var(--text);
  font-family: var(--font-code);
  font-size: var(--size-code);
  line-height: 1.45;
  resize: vertical;
}
.editor-fallback:focus { outline: none; }

/* ----- action row ----- */
.actions { display: flex; gap: 10px; margin-bottom: 16px; }
.btn {
  font-family: var(--font-code);
  font-size: 13px;
  padding: 7px 16px;
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
}
.btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.btn.ghost { background: transparent; color: var(--muted); }

/* ----- output panel ----- */
.output { font-family: var(--font-code); font-size: var(--size-code); padding: 10px 12px; }
.out-line { line-height: 1.45; white-space: pre-wrap; }
.out-line.info { color: var(--muted); }
.out-line.success { color: var(--success); }
.out-line.error { color: var(--error); }
.out-line.ready { color: var(--text-soft); }
.out-line.cmd { color: var(--muted); }

/* friendly error annotation — sits beneath the untouched raw traceback */
.err-annotation { margin-top: 8px; padding: 8px 12px; border-left: 3px solid var(--accent); background: var(--panel-header); }
.err-ann-head { font-family: var(--font-code); font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.err-ann-body { color: var(--text); line-height: 1.5; }

/* style channel — advisory second feedback channel, visually distinct from errors */
.style-channel { margin-top: 8px; padding: 8px 12px; border-left: 3px solid var(--muted); background: var(--panel-header); }
.style-head { font-family: var(--font-code); font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.style-item { color: var(--text-soft); line-height: 1.5; }

/* worked example */
.example-wrap { margin-bottom: 20px; }
.example-intro {
  margin: 0 0 8px;
  line-height: 1.45;
  color: var(--text-soft);
}
.example-actions { margin-top: 0; padding: 10px 12px; }

/* predict exercise: input box for the student's guess */
.predict-wrap {
  padding: 10px 12px;
  border-top: var(--border-w) solid var(--border);
}
.predict-label {
  font-family: var(--font-code);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}
.predict-input {
  width: 100%;
  box-sizing: border-box;
  font-family: var(--font-code);
  font-size: var(--size-code);
  background: var(--bg);
  color: var(--text);
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  resize: vertical;
  line-height: 1.5;
}
.predict-input:focus { outline: none; border-color: var(--accent); }
.challenge-task { margin: 4px 0 10px; line-height: 1.5; color: var(--text); }
/* rich sections: visual separation between stacked exercises */
.exercise-block { margin-top: 20px; padding-top: 12px; border-top: var(--border-w) solid var(--border); }
.exercise-block .challenge-task code { font-size: 0.82em; color: var(--code-inline); background: var(--code-inline-bg); padding: 1px 4px; border-radius: 3px; }
.challenge-label { color: var(--accent); font-weight: 600; }

/* section-type dividers: "Examples" / "Your turn" */
.section-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 14px;
  font-family: var(--font-code);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* color-coded panel variants */
.example-panel { border-left: 3px solid var(--muted); }
.exercise-panel { border-left: 3px solid var(--accent); }

/* output rendered inside the same panel as its code — top border acts as divider */
.inpanel-output {
  border-top: var(--border-w) solid var(--border);
  min-height: 36px;
}

/* hint ladder */
.hint-host { margin-bottom: 14px; }
.hint-item { padding: 8px 12px; margin-bottom: 6px; border-left: 3px solid var(--accent); background: var(--panel); color: var(--text-soft); line-height: 1.5; }

/* model solution panel */
.model-code { margin: 0; padding: 12px; font-family: var(--font-code); font-size: var(--size-code); color: var(--text); white-space: pre; overflow-x: auto; }

/* knowledge map */
.map-body { padding: 12px; }
.map-search { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 7px 10px; border: var(--border-w) solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--font-code); font-size: var(--size-code); }
.map-search:focus { outline: none; border-color: var(--accent); }
.map-chapter { font-family: var(--font-display); font-size: calc(var(--size-display) * 0.6); color: var(--muted); margin: 12px 0 6px; }
.map-lesson { display: flex; align-items: baseline; gap: 10px; padding: 7px 10px; border: var(--border-w) solid var(--border); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; background: var(--panel); }
.map-lesson.current { border-color: var(--accent); }
.map-mark { color: var(--success); width: 1em; flex: none; }
.map-title { color: var(--text); }
.map-tags { color: var(--muted); font-family: var(--font-code); font-size: 12px; margin-left: auto; }
.map-empty { color: var(--muted); padding: 8px 0; }

/* pass badge (magazine stamps an outline; other themes restyle below) */
.pass-badge {
  display: inline-block;
  border: 1.5px solid var(--success);
  color: var(--success);
  border-radius: 4px;
  padding: 1px 8px;
  font-size: 12px;
}

/* terminal footer key hints (rendered only in terminal) */
.keyhints { display: flex; justify-content: space-between; color: var(--muted); font-family: var(--font-code); font-size: 12px; margin-top: 10px; }

/* ----- theme switcher ----- */
.themebar { display: flex; gap: 8px; align-items: center; margin-top: 26px; padding-top: 14px; border-top: var(--border-w) solid var(--border); }
.themebar .label { color: var(--muted); font-family: var(--font-code); font-size: 12px; margin-right: 4px; }
.themebar .theme-opt {
  font-family: var(--font-code);
  font-size: 12px;
  padding: 4px 10px;
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-soft);
  cursor: pointer;
}
.themebar .theme-opt.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }

/* =====================================================================
   Per-theme signature elements (DESIGN.md). Raw hex is intentional here.
   ===================================================================== */

/* ---- magazine: keycap buttons, printed listing ---- */
[data-theme="magazine"] .btn {
  border: 1px solid #C9BC9C;
  border-bottom: 3px solid #B3A37D;
  border-radius: 6px;
}
[data-theme="magazine"] .btn.primary {
  background: #2A2517;
  color: #F5EEDD;
  border: 1px solid #2A2517;
  border-bottom: 3px solid #000;
}
[data-theme="magazine"] .btn.ghost { border: 1px solid #C9BC9C; border-bottom: 3px solid #B3A37D; }
[data-theme="magazine"] .cm-keyword, [data-theme="magazine"] .cm-builtin { color: #C8491F; }
[data-theme="magazine"] .cm-string, [data-theme="magazine"] .cm-string-2, [data-theme="magazine"] .cm-number { color: #4E7A1B; }
[data-theme="magazine"] .cm-comment { color: #9A8F6E; }

/* ---- c64: thick frame, pixel headings, block buttons, lowercase ---- */
[data-theme="c64"] { --frame-w: 24px; }
[data-theme="c64"] .app,
[data-theme="c64"] #boot-header,
[data-theme="c64"] .topbar .title,
[data-theme="c64"] .appnav,
[data-theme="c64"] .prompt,
[data-theme="c64"] .out-line { text-transform: lowercase; }
[data-theme="c64"] .btn {
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 11px;
  padding: 9px 14px;
}
[data-theme="c64"] .btn.primary { background: var(--accent); color: var(--accent-contrast); border: 2px solid var(--accent); }
[data-theme="c64"] .btn.secondary { background: #7869C4; color: #1B1145; border: 2px solid #7869C4; }
[data-theme="c64"] .btn.ghost { background: transparent; color: var(--muted); border: 2px solid var(--border); }
[data-theme="c64"] .topbar .title { font-size: var(--size-display); }
[data-theme="c64"] .progress .cell { border-radius: 0; }
[data-theme="c64"] .cm-keyword, [data-theme="c64"] .cm-builtin { color: #7BD7D0; }
[data-theme="c64"] .cm-string, [data-theme="c64"] .cm-string-2, [data-theme="c64"] .cm-number { color: #F0E97C; }
[data-theme="c64"] .cm-comment { color: #7B6FD0; }

/* ---- terminal: bracketed commands, amber actions ---- */
[data-theme="terminal"] .btn { background: transparent; border-radius: 0; }
[data-theme="terminal"] .btn::before { content: "[ "; }
[data-theme="terminal"] .btn::after { content: " ]"; }
[data-theme="terminal"] .btn.primary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
[data-theme="terminal"] .btn.secondary { color: var(--success); border: 1px solid #4E7A58; }
[data-theme="terminal"] .btn.ghost { color: var(--muted); border: 1px solid var(--border); }
[data-theme="terminal"] .pass-badge { background: var(--accent); color: var(--accent-contrast); border: none; }
[data-theme="terminal"] .cm-keyword, [data-theme="terminal"] .cm-builtin { color: #5BE08A; }
[data-theme="terminal"] .cm-string, [data-theme="terminal"] .cm-string-2, [data-theme="terminal"] .cm-number { color: #FFB454; }
[data-theme="terminal"] .cm-comment { color: #3A5C42; }

/* term-links + more-info expansions (teaching prose) */
a.term { color: var(--accent); border-bottom: 1px dotted var(--accent); cursor: pointer; }
.term-def { margin: 6px 0; padding: 8px 10px; background: var(--panel-header); border: var(--border-w) solid var(--border); border-radius: var(--radius); font-size: .92em; color: var(--text-soft); }
.more-info { margin: 8px 0 0; }
.more-toggle { font-family: var(--font-code); font-size: 12px; background: none; border: 1px dashed var(--border); color: var(--text-soft); padding: 3px 8px; border-radius: var(--radius); cursor: pointer; }
.more-body { margin-top: 6px; padding: 8px 10px; background: var(--panel-header); border: var(--border-w) solid var(--border); border-radius: var(--radius); color: var(--text-soft); font-size: .94em; }

/* term definition as a HOVER popover */
.term-wrap { position: relative; }
a.term { cursor: help; }
.term-pop { display: none; position: absolute; left: 0; top: 1.7em; z-index: 30; width: max-content; max-width: 300px; padding: 8px 10px; background: var(--panel); border: var(--border-w) solid var(--border); border-radius: var(--radius); color: var(--text-soft); font-size: .85em; line-height: 1.4; white-space: normal; }
.term-wrap:hover .term-pop { display: block; }
.lesson-footnav { display: flex; justify-content: space-between; align-items: center; margin: 22px 0 6px; padding-top: 14px; border-top: var(--border-w) solid var(--border); }

/* Codex — the earned cheat sheet (Skills / Glossary / Errors tabs) */
.codex-body { padding: 12px; }
.codex-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.codex-tab { font-family: var(--font-code); font-size: 13px; padding: 4px 12px; border: var(--border-w) solid var(--border); background: var(--panel); color: var(--text-soft); cursor: pointer; border-radius: var(--radius); }
.codex-tab.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.codex-topic { font-family: var(--font-display); font-size: calc(var(--size-display) * 0.6); color: var(--text); margin: 16px 0 6px; }
.codex-entry { border-left: 3px solid var(--accent); background: var(--panel); padding: 8px 12px; margin: 8px 0; }
.codex-pattern { font-family: var(--font-code); font-size: var(--size-code); color: var(--text); margin: 0 0 4px; white-space: pre-wrap; }
.codex-note { color: var(--text-soft); line-height: 1.5; }
.codex-link { display: inline-block; margin-top: 6px; font-family: var(--font-code); font-size: 12px; color: var(--accent); cursor: pointer; border-bottom: 1px dotted var(--accent); }
.codex-term-row { display: flex; gap: 12px; padding: 7px 0; border-bottom: var(--border-w) solid var(--border); }
.codex-term { font-family: var(--font-code); color: var(--accent); min-width: 150px; font-weight: 500; }
.codex-def { color: var(--text-soft); line-height: 1.5; }
.codex-empty { color: var(--muted); font-style: italic; padding: 10px 0; }

/* Parsons (rung 2) drag-to-reorder */
.parsons-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
.parsons-item {
  padding: 8px 12px;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-code);
  font-size: 0.9em;
  cursor: grab;
  user-select: none;
}
.parsons-item::before { content: "⠿ "; opacity: 0.35; }
.parsons-item.over { border-color: var(--accent); background: var(--panel-alt, var(--panel)); }

/* restart-course control (testing + a real reset) */
.themebar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.restart-btn { margin-left: auto; font-family: var(--font-code); font-size: 12px; padding: 4px 10px; border: var(--border-w) solid var(--border); background: var(--panel); color: var(--muted); cursor: pointer; border-radius: var(--radius); }
.restart-btn:hover { color: var(--error); border-color: var(--error); }

<script>
window.CODELAB = { lessons: [], arena: [] };

/* ===== c1.js ===== */
/* Chapter 1 — Basics
   Rebuilt to CODELAB_FULL_REPORT.md + CODELAB_CH1_REBUILT.md.
   Lessons: c1s1 Output & print · c1s2 Values & types · c1s3 Variables &
            assignment · c1s4 Expressions & math · c1s5 Strings & text ·
            c1s6 Text templates · c1s7 Input · c1s8 Drawing, Sound & your
            first real program (finale). */

/* ── Lesson 1.1 — Output & print ─────────────────────────────────────── */

window.CODELAB.lessons.push({
  id: "c1s1",
  chapter: 1,
  strand: "core",
  lang: "py",
  timeBudgetMin: 23,
  title: "Output & print",
  glossary: {
    "print": "The instruction that shows a value on the screen, then moves to a new line.",
    string: "Text inside quotes. The quotes mark where the text starts and ends — they are not part of the text itself.",
  },
  content: [
    {
      type: "text",
      md: "A Python program stays silent unless you tell it to speak. [[print]] is how it speaks: you hand it something inside the parentheses, and it shows up on the screen.",
    },
    {
      type: "example",
      note: "Run it. The quotes don't show — they just mark where the text starts and ends. Change the title to your favourite song and run again.",
      code: "print(\"Blinding Lights\")\n",
    },
    {
      type: "exercise",
      rung: 1,
      prompt: "Before you run it, what shows up, and on which lines? Write your guess, then run to check.",
      starter: "print(\"ready\")\nprint(\"set\")\nprint(\"go\")\n",
      check: { type: "output", expected: "ready\nset\ngo" },
      hints: [
        "Each `print` gets its own line.",
        "They run top to bottom.",
        "ready, then set, then go.",
      ],
      solution: "print(\"ready\")\nprint(\"set\")\nprint(\"go\")\n",
    },
    {
      type: "text",
      md: "Text you want to show goes inside quotes — that turns it into a [[string]]. Single or double quotes both work. Use double quotes when your text has an apostrophe in it, like `\"it's fine\"`, so the apostrophe doesn't cut the string short.",
    },
    {
      type: "example",
      note: "Two prints, two lines, in the order you wrote them.",
      code: "print(\"Code\")\nprint(\"Lab\")\n",
    },
    {
      type: "exercise",
      rung: 3,
      prompt: "This prints Code and Lab on two lines. Make both words show on one line reading `Code Lab`, using a single print.",
      starter: "print(\"Code\")\nprint(\"Lab\")\n",
      check: { type: "output", expected: "Code Lab" },
      hints: [
        "One print can take more than one thing, separated by a comma.",
        "A comma puts a space between them for you.",
        "print(\"Code\", \"Lab\")",
      ],
      solution: "print(\"Code\", \"Lab\")\n",
    },
    {
      type: "text",
      md: "You can hand `print` more than one thing at once — separate them with commas, and it puts a space between each. They don't have to be text: `print(\"Score:\", 7 * 3)` works out the maths first and shows `Score: 21`.",
    },
    {
      type: "example",
      note: "Python does the maths first, then prints the label and the answer with a space between.",
      code: "print(\"Score:\", 7 * 3)\n",
    },
    {
      type: "exercise",
      rung: 4,
      prompt: "This crashes. Run it, read the error — it tells you what went wrong — then fix it so it prints `Hello`.",
      starter: "print(Hello)\n",
      check: { type: "output", expected: "Hello" },
      hints: [
        "`Hello` has no quotes, so Python thinks it's a variable name and can't find one.",
        "Text needs quotes to be a string.",
        "print(\"Hello\")",
      ],
      solution: "print(\"Hello\")\n",
    },
    {
      type: "exercise",
      rung: 6,
      prompt: "From an empty editor, print exactly these three lines:\n`Python speaks.`\n`So do I.`\n`Let's begin.`\nWatch the apostrophe in the last line — wrap it in double quotes so it doesn't end your string early.",
      starter: "",
      check: { type: "output", expected: "Python speaks.\nSo do I.\nLet's begin." },
      hints: [
        "Three separate print lines.",
        "For the last one use double quotes: \"Let's begin.\"",
        "print(\"Let's begin.\")",
      ],
      solution: "print(\"Python speaks.\")\nprint(\"So do I.\")\nprint(\"Let's begin.\")\n",
    },
  ],
  codex: {
    topic: "print",
    pattern: "print(\"text\")\nprint(\"a\", \"b\")   # space between",
    note: "print shows whatever you put in its parentheses, then moves to a new line. Hand it several things separated by commas and it prints them with a space between.",
  },
});

/* ── Lesson 1.2 — Values & types ─────────────────────────────────────── */

window.CODELAB.lessons.push({
  id: "c1s2",
  chapter: 1,
  strand: "core",
  lang: "py",
  timeBudgetMin: 25,
  title: "Values & types",
  glossary: {
    value: "Any single piece of data your program works with — a number, some text, a yes/no.",
    "type": "The kind of thing a value is — a whole number (int), a decimal (float), text (str), or a yes/no (bool). The type decides what you can do with the value.",
    "int": "A whole number, like 7 or -3 (short for 'integer').",
    "float": "A number with a decimal point, like 3.14 or 3.0.",
    "str": "Text — characters inside quotes (short for 'string').",
    "bool": "A yes/no value — either True or False (short for 'boolean').",
    TypeError: "The error Python gives when you combine values whose types don't fit — like adding a number to text.",
  },
  content: [
    {
      type: "text",
      md: "Everything your program works with is a [[value]]: a number, some text, a yes-or-no. Every value has a [[type]] — the kind of thing it is — and the type decides what you're allowed to do with it.",
    },
    {
      type: "example",
      note: "type() tells you a value's kind. Four values, four types.",
      code: "print(type(7))\nprint(type(3.14))\nprint(type(\"hello\"))\nprint(type(True))\n",
    },
    {
      type: "text",
      md: "Four types will carry you a long way. A whole number like `7` is an [[int]]. A decimal like `3.14` is a [[float]]. Text in quotes is a [[str]]. `True` and `False` are [[bool]]s — you'll use those in Chapter 2 to make decisions.",
    },
    {
      type: "text",
      md: "The quotes change everything. `7` is the number seven. `\"7\"` is text that happens to look like a digit. They look the same, but the type changes what the operators do.",
    },
    {
      type: "example",
      note: "Same +, two different jobs. Between numbers it adds; between strings it joins.",
      code: "print(7 + 7)       # 14 — adds\nprint(\"7\" + \"7\")   # 77 — joins\n",
    },
    {
      type: "exercise",
      rung: 1,
      prompt: "Predict all three lines, and note why the last two look different. Then run.",
      starter: "print(2 + 3)\nprint(\"2\" + \"3\")\nprint(\"hi\" * 3)\n",
      check: { type: "output", expected: "5\n23\nhihihi" },
      hints: [
        "`+` between numbers adds; between strings it joins.",
        "`*` repeats a string.",
        "5, then 23, then hihihi.",
      ],
      solution: "print(2 + 3)\nprint(\"2\" + \"3\")\nprint(\"hi\" * 3)\n",
    },
    {
      type: "exercise",
      rung: 3,
      prompt: "This adds 2 and 3 and prints 5. Change it so it *joins* them as text instead, printing `23`.",
      starter: "print(2 + 3)\n",
      check: { type: "output", expected: "23" },
      hints: [
        "Text in quotes joins instead of adding.",
        "Put quotes around each digit.",
        "print(\"2\" + \"3\")",
      ],
      solution: "print(\"2\" + \"3\")\n",
    },
    {
      type: "text",
      md: "Mix a number and text with `+` and Python stops with a [[TypeError]] — it won't guess whether you meant to add or join. Convert first: `int(\"3\")` turns text into a number, and `str(7)` turns a number into text.",
    },
    {
      type: "example",
      note: "int() and str() convert between types so + knows what you mean.",
      code: "print(int(\"3\") + 7)   # 10\nprint(str(7) + \"!\")   # 7!\n",
    },
    {
      type: "exercise",
      rung: 4,
      prompt: "This crashes with a TypeError — it's adding a number and text. Convert the text so it prints `10`.",
      starter: "print(7 + \"3\")\n",
      check: { type: "output", expected: "10" },
      hints: [
        "Python won't add a number to text.",
        "Wrap the `\"3\"` in `int()`.",
        "print(7 + int(\"3\"))",
      ],
      solution: "print(7 + int(\"3\"))\n",
    },
    {
      type: "text",
      md: "Curious? Try `0.1 + 0.2` — you'll get `0.30000000000000004`. Computers can't store some decimals exactly. It almost never matters; just don't be surprised.",
    },
    {
      type: "exercise",
      rung: 6,
      prompt: "From scratch: take the text `\"20\"`, turn it into a number, add 5, and print the result. It should print `25`.",
      starter: "",
      check: { type: "output", expected: "25" },
      hints: [
        "`\"20\"` is text — convert it with `int()`.",
        "Then add 5.",
        "print(int(\"20\") + 5)",
      ],
      solution: "print(int(\"20\") + 5)\n",
    },
  ],
  codex: {
    topic: "values & types",
    pattern: "type(7)      # int\ntype(3.14)   # float\nint(\"3\")     # text -> number\nstr(7)       # number -> text",
    note: "Every value has a type: int, float, str, bool. The type decides what operators do — 7 + 7 adds, \"7\" + \"7\" joins. Convert with int() and str().",
  },
});

/* ── Lesson 1.3 — Variables & assignment ─────────────────────────────── */

window.CODELAB.lessons.push({
  id: "c1s3",
  chapter: 1,
  strand: "core",
  lang: "py",
  timeBudgetMin: 24,
  title: "Variables & assignment",
  glossary: {
    variable: "A name you pick that points to a value, so you can store it and use it later. You can repoint the name to a different value anytime.",
    comment: "A note in the code after a #. Python ignores it — it's there for the human reader.",
  },
  content: [
    {
      type: "text",
      md: "So far every value is used the moment you write it. A [[variable]] lets you keep one and use it later. A variable is a name you pick that points to a value.",
    },
    {
      type: "example",
      note: "score now points to 100. Write the name and Python looks up what it points to.",
      code: "score = 100\nprint(score)\n",
    },
    {
      type: "text",
      md: "The `=` doesn't mean \"is equal to.\" It's a command: work out the right side, then point the name on the left at the result. Read `score = 100` as \"let score point to 100.\"",
    },
    {
      type: "text",
      md: "In maths, `x = 5` is forever. In Python it just means \"right now, x points to 5\" — and you can repoint it anytime. Think of the name as a sticky note you can move to a different value.",
    },
    {
      type: "example",
      note: "The second line moves the sticky note. Watch the variable table in the stepper change from 100 to 200.",
      code: "score = 100\nprint(score)\nscore = 200\nprint(score)\n",
    },
    {
      type: "exercise",
      rung: 1,
      prompt: "Trace it line by line. After each line, what does `x` point to? What prints at the end?",
      starter: "x = 5\nx = 10\nprint(x)\n",
      check: { type: "output", expected: "10" },
      hints: [
        "First line: x points to 5.",
        "Second line moves it to 10.",
        "It prints 10.",
      ],
      solution: "x = 5\nx = 10\nprint(x)\n",
    },
    {
      type: "text",
      md: "Python works out the whole right side *before* repointing the name — so you can use a variable's current value to set its next one: `score = score + 5`. There's a shortcut for that: `score += 5` means the same thing. A `#` starts a [[comment]] — Python ignores everything after it on the line.",
    },
    {
      type: "example",
      note: "The right side (10 + 5) is worked out first, then stored back in score.",
      code: "score = 10\nscore = score + 5   # 10 + 5 = 15\nprint(score)\n",
    },
    {
      type: "exercise",
      rung: 4,
      prompt: "This should print 15 but crashes. Read the error — it names the word Python can't find — and fix the typo.",
      starter: "points = 10\ntotal = pints + 5\nprint(total)\n",
      check: { type: "output", expected: "15" },
      hints: [
        "`pints` is not the name you created.",
        "You stored the value under `points`.",
        "Change `pints` to `points`.",
      ],
      solution: "points = 10\ntotal = points + 5\nprint(total)\n",
    },
    {
      type: "exercise",
      rung: 3,
      prompt: "Right now this ends by printing Bob. Change the second line so it prints `Charlie` instead.",
      starter: "name = \"Alice\"\nname = \"Bob\"\nprint(name)\n",
      check: { type: "output", expected: "Charlie" },
      hints: [
        "The last value the name points to is what prints.",
        "Change the second assignment.",
        "name = \"Charlie\"",
      ],
      solution: "name = \"Alice\"\nname = \"Charlie\"\nprint(name)\n",
    },
    {
      type: "exercise",
      rung: 6,
      prompt: "From scratch: store the name `Alex` in a variable called `name` and the number 11 in `age`. Then print them on one line: `Alex is 11`.",
      starter: "",
      check: { type: "output", expected: "Alex is 11" },
      hints: [
        "Two assignments first.",
        "Then one print with commas.",
        "print(name, \"is\", age)",
      ],
      solution: "name = \"Alex\"\nage = 11\nprint(name, \"is\", age)\n",
    },
  ],
  codex: {
    topic: "variables & assignment",
    pattern: "score = 100      # let score point to 100\nscore = score + 5\nscore += 5       # same shortcut",
    note: "A variable is a name pointing to a value. = works out the right side, then repoints the name. Move the sticky note anytime; += adds to the current value.",
  },
});

/* ── Lesson 1.4 — Expressions & math ─────────────────────────────────── */

window.CODELAB.lessons.push({
  id: "c1s4",
  chapter: 1,
  strand: "numbers",
  lang: "py",
  timeBudgetMin: 22,
  title: "Expressions & math",
  glossary: {
    expression: "Anything Python can work out to a value — like `7 * 3` or `10 - 4`, or even just `7`. You can print it, store it, or drop it inside a bigger expression.",
  },
  content: [
    {
      type: "text",
      md: "An [[expression]] is anything Python can work out to a value: `7 * 3`, `10 - 4`, even just `7`. You can print the result, store it in a variable, or drop it inside a bigger expression.",
    },
    {
      type: "text",
      md: "The operators: `+ - *` you know. `/` divides and always gives a decimal — `6 / 2` is `3.0`, not `3`. `//` divides and drops the leftover — `7 // 2` is `3`. `%` gives the leftover — `7 % 3` is `1`. `**` is powers — `2 ** 8` is `256`.",
    },
    {
      type: "example",
      note: "Notice / gives a decimal even when it divides evenly.",
      code: "print(7 / 2)    # 3.5\nprint(7 // 2)   # 3\nprint(7 % 3)    # 1\nprint(2 ** 8)   # 256\n",
    },
    {
      type: "exercise",
      rung: 3,
      prompt: "This works out the seconds in 5 minutes (5 × 60). Change it to the seconds in 3 hours instead. It should print `10800`.",
      starter: "print(5 * 60)\n",
      check: { type: "output", expected: "10800" },
      hints: [
        "An hour is 60 minutes, a minute is 60 seconds.",
        "3 × 60 × 60.",
        "print(3 * 60 * 60)",
      ],
      solution: "print(3 * 60 * 60)\n",
    },
    {
      type: "text",
      md: "Python does maths in the usual order: powers first, then `* / // %`, then `+ -`. **Parentheses** jump the queue — whatever's inside is worked out first. When in doubt, add them.",
    },
    {
      type: "example",
      note: "The parentheses change the answer. Work out both before running.",
      code: "print(3 + 4 * 2)     # 11\nprint((3 + 4) * 2)   # 14\n",
    },
    {
      type: "exercise",
      rung: 1,
      prompt: "Work out each line in your head — order of operations is the key. Then run to check.",
      starter: "print(2 + 3 * 4)\nprint((2 + 3) * 4)\nprint(10 % 3)\n",
      check: { type: "output", expected: "14\n20\n1" },
      hints: [
        "`*` before `+`.",
        "Parentheses first on line 2.",
        "`10 % 3` is the remainder, 1.",
      ],
      solution: "print(2 + 3 * 4)\nprint((2 + 3) * 4)\nprint(10 % 3)\n",
    },
    {
      type: "text",
      md: "`%` has a handy trick: `n % 2` is `0` for even numbers and `1` for odd ones. You'll use that in Chapter 2 to make decisions.",
    },
    {
      type: "exercise",
      rung: 4,
      prompt: "This should print the average of 10, 20, and 30 — which is 20.0 — but the order of operations divides only the 30 first. Add parentheses to fix it.",
      starter: "print(10 + 20 + 30 / 3)\n",
      check: { type: "output", expected: "20.0" },
      hints: [
        "Right now only `30 / 3` happens first.",
        "Add the three numbers before dividing.",
        "print((10 + 20 + 30) / 3)",
      ],
      solution: "print((10 + 20 + 30) / 3)\n",
    },
    {
      type: "exercise",
      rung: 6,
      prompt: "From scratch: a song is 3 minutes and 45 seconds long. Print its total length in seconds. (3 × 60, plus 45.)",
      starter: "",
      check: { type: "output", expected: "225" },
      hints: [
        "Minutes to seconds first.",
        "Then add the 45.",
        "print(3 * 60 + 45)",
      ],
