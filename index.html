    {
      "id": "setup",
      "title": "Set up Python on your Mac",
      "order": 0,
      "body": "# Code Lab Capstone — Part 0: Leaving the Sandbox\n\nEverything in Chapters 1–8 ran inside Code Lab, in the browser. That was on purpose — no setup, instant feedback. But a few things were *faked*: saving a file, loading it back, reading from the keyboard. On a real computer, those are real. This is where you stop practicing and start building programs that live on your own machine, in your own folder, that you can run any time and show anyone.\n\nThis guide gets you set up once. Then you pick one of three capstone projects and build it for real.\n\n---\n\n## 1. Get Python onto your computer\n\nThe friendliest way to start on a Mac is **Thonny** — a free app that bundles its own Python, a code editor, and a big green **Run** button in one window. That bundled Python matters here: it sidesteps the old system Python that macOS ships with, so you don't have to think about versions. Download the `.dmg` from `thonny.org`, drag Thonny into your **Applications** folder, and open it. The first time, macOS may warn that it's from an \"unidentified developer\" — **right-click the app and choose Open**, then click Open again, and it'll trust it from then on.\n\n**Check it worked.** In Thonny, the bottom panel (the \"Shell\") shows the Python version when it starts. To check from the Terminal, type:\n\n```\npython3 --version\n```\n\nYou should see something like `Python 3.12.x`. On a Mac, always use `python3` (and `pip3`), never plain `python` — that older name may be missing or point at an ancient Python 2. If you see a 3.x version, you're ready.\n\n---\n\n## 2. Make a workspace\n\nCreate a folder for your projects — call it `code-lab` — somewhere easy to find (your Desktop or Documents). Every program you write goes in here as a `.py` file. Keeping one folder means your programs and the files they save all stay together.\n\n---\n\n## 3. Meet the terminal\n\nThe terminal is a window where you type commands to your computer directly. It's how real programmers run programs. You don't need it to *write* code (the editor does that), but you do need it to *run* code the way real users would.\n\nOpen it with **Cmd+Space**, type \"Terminal\", and press Enter. The one command to learn first is `cd` (\"change directory\") — it moves the terminal into a folder:\n\n```\ncd Desktop/code-lab\n```\n\nNow the terminal is \"standing inside\" your project folder, and it can run the files there.\n\n---\n\n## 4. Your first real program\n\nIn Thonny (or any editor), type this and save it as `hello.py` in your `code-lab` folder:\n\n```python\nprint(\"Hello from my own computer!\")\nname = input(\"What's your name? \")\nprint(\"Nice to meet you,\", name)\n```\n\nRun it **two ways**, so you know both:\n\n- **In Thonny:** press the green **Run** button. The Shell at the bottom runs it and waits for you to type your name.\n- **In the terminal:** `cd` into `code-lab`, then type `python3 hello.py` and press Enter. It runs, and — this is the real thing — `input()` actually pauses and waits for you to type. No more pretend inputs.\n\nThat pause is the difference between the sandbox and the real world. Your program is now talking to a real keyboard.\n\n---\n\n## 5. The loop you'll live in\n\nReal programming is a loop, and you already know its shape from Chapter 5:\n\n**Edit → Run → Read the error → Fix → Run again.**\n\nWhen something breaks, the terminal prints a **traceback** — the exact same kind you learned to read in Chapters 5 and 8. The last line names the error (`ValueError`, `KeyError`, `TypeError`…), and the lines above it show which function called which, ending at the line that broke. Reading it is a skill you already have. Change a program to break it on purpose once, run it, and read the traceback — so a real one never scares you.\n\nBuild in small steps: write one function, run it, make sure it works, then write the next. If you write fifty lines and *then* run it, a bug could be anywhere. If you run after every function, you always know where you are.\n\n---\n\n## 6. Real files (this is the part Code Lab faked)\n\nOn a real computer, `open()` and `json` actually write files you can see in your folder. Try this as `save_test.py`:\n\n```python\nimport json\n\ndata = {\"name\": \"Alex\", \"level\": 7}\nwith open(\"save.json\", \"w\") as f:\n    json.dump(data, f)\n\nwith open(\"save.json\", \"r\") as f:\n    loaded = json.load(f)\n\nprint(\"Loaded back:\", loaded)\n```\n\nRun it, then open your `code-lab` folder — there's a new file called `save.json`. Open it in any text editor and you'll see your data as text. Run the program again tomorrow and it's still there. That's persistence, for real. Remember from Chapter 7: the path `\"save.json\"` is relative to the folder your terminal is standing in, so run your program from its own folder.\n\n---\n\n## 7. Installing extra tools (for later)\n\nPython comes with a lot built in, but a couple of \"level up\" stretch goals want extra tools you install with **pip**. You won't need this to start any capstone. On a Mac the command is:\n\n```\npip3 install matplotlib\n```\n\nOn a recent Mac this sometimes fails with an \"externally-managed-environment\" message — that's macOS protecting its system Python, not you doing anything wrong. The easy, kid-proof fix is to install through **Thonny** instead: go to **Tools → Manage Packages**, search for the package (like `matplotlib`), and click **Install**. Thonny puts it in its own environment and the error never comes up. That's the reliable way to get any package a stretch goal needs.\n\n---\n\n## 8. Pick your capstone\n\nYou're set up. Now choose one project (or do more than one) and build it in a `.py` file in your `code-lab` folder, running it from the terminal as you go. Each project comes with a spec, milestones that start scaffolded and get freer, a full reference program you can check yourself against *after* trying, and stretch goals.\n\n- **Beat Machine** (`CAPSTONE_BEAT_MACHINE.md`) — a step sequencer / drum machine you program, play, and save. Most music, most classes and data structures.\n- **Data Dashboard** (`CAPSTONE_DATA_DASHBOARD.md`) — a weather or solar-system dashboard that owns a real dataset and shows it three ways. Most charts and analysis.\n- **Data Analyzer** (`CAPSTONE_DATA_ANALYZER.md`) — point it at numbers *you* care about; it computes stats, charts them, and flags what stands out. Most open-ended, most \"design it yourself.\"\n\nEvery one of them uses the whole course: variables and strings (Ch1), loops and `if` and `try`/`except` (Ch2), functions and decomposition (Ch3, Ch5), lists and dicts (Ch4), classes (Ch6), files and JSON (Ch7), and comprehensions and robust programs (Ch8). This is where all of it comes together into something that's yours.\n"
    },
    {
      "id": "beat-machine",
      "title": "The Beat Machine",
      "order": 1,
      "body": "# Capstone Project — The Beat Machine\n\nBuild a **step sequencer**: a drum machine you program beat by beat, play back, edit, and save. This is the most music-forward capstone and it exercises the most of the course — nested data, a menu program, functions, files, and (as a stretch) a class and real sound.\n\nSet up first with `CAPSTONE_00_SETUP.md`. Build this in a file called `beat_machine.py` and run it from the terminal with `python3 beat_machine.py`.\n\n---\n\n## What you're building\n\nA beat is a grid. Down the side are **tracks** (kick, snare, hihat). Across the top are **steps** in time. Each cell is on or off:\n\n```\nTempo: 120 BPM\n       01234567\nkick   #...#...\nsnare  ..#...#.\nhihat  ########\n```\n\nYour program shows this grid, **plays** it by stepping across the columns in time, lets you **toggle** any cell on or off, change the **tempo**, and **save/load** the whole beat as a JSON file so it's still there tomorrow.\n\n## The data model\n\nThe whole song is one dictionary — a tempo and a dict of tracks, each track a list of 0s and 1s (Chapter 4, all the way):\n\n```python\nsong = {\n    \"tempo\": 120,\n    \"tracks\": {\n        \"kick\":  [1, 0, 0, 0, 1, 0, 0, 0],\n        \"snare\": [0, 0, 1, 0, 0, 0, 1, 0],\n        \"hihat\": [1, 1, 1, 1, 1, 1, 1, 1],\n    },\n}\n```\n\nA `1` means \"hit on this step,\" a `0` means \"rest.\" That's it — everything else is functions that read and change this one structure.\n\n---\n\n## Milestones (build in this order, run after each)\n\n**1 — Show the grid.** Write `show(song)` that prints the tempo and, for each track, a row of `#` (hit) and `.` (rest). *Uses:* dict looping (Ch4), a `for` loop building a string, an f-string (Ch1). Run it on the starter song and check the grid looks right before doing anything else.\n\n**2 — Play it.** Write `play(song)` that walks the steps `0` to `7`, and on each step prints which tracks have a `1` there, pausing between steps so it plays *in time*. The pause is `60 / tempo / 2` seconds (that spaces the steps as eighth notes). *Uses:* `import time` and `time.sleep(...)`, a loop, a `for`+`if` filter of the tracks. This is your first taste of real timing.\n\n**3 — The menu loop.** Write `menu(song)`: a `while True` loop that shows the grid, reads a one-letter choice with `input()`, and calls the right function — play, edit, tempo, save, load, quit. *Uses:* the `while True` + `input()` menu pattern (Ch2/Ch8), `if`/`elif`/`else`. Wrap the risky parts in `try`/`except` so a wrong key never crashes the program.\n\n**4 — Edit a step.** Write `toggle(song, track, step)` that flips one cell between 0 and 1. Ask the user which track and which step, and guard bad answers (a track that doesn't exist → `KeyError`, a step that's out of range → `IndexError`, a non-number → `ValueError`) with one `except`. *Uses:* dict/list indexing, `try`/`except` with several classes (Ch8).\n\n**5 — Save and load (for real).** Write `save(song, path)` and `load(path)` using `json.dump`/`json.load` inside `with` blocks (Ch7). Now your beat survives closing the program. Handle \"no saved song yet\" with `except FileNotFoundError`.\n\n**6 — Make it yours.** Change the starter pattern to a beat *you* like. Add a fourth track. Widen the grid to 16 steps. This is the point of the whole thing.\n\n---\n\n## Reference program (check yourself against this *after* you've tried each milestone)\n\nThis is a complete, working version. Yours doesn't have to match line for line — if it shows, plays, edits, and saves, it's right.\n\n```python\nimport json, time\n\nSTEPS = 8\n\ndef new_song():\n    return {\"tempo\": 120, \"tracks\": {\n        \"kick\":  [1, 0, 0, 0, 1, 0, 0, 0],\n        \"snare\": [0, 0, 1, 0, 0, 0, 1, 0],\n        \"hihat\": [1, 1, 1, 1, 1, 1, 1, 1]}}\n\ndef show(song):\n    print(f\"\\nTempo: {song['tempo']} BPM\")\n    print(\"       \" + \"\".join(str(i) for i in range(STEPS)))\n    for name, pattern in song[\"tracks\"].items():\n        cells = \"\".join(\"#\" if pattern[i] else \".\" for i in range(STEPS))\n        print(f\"{name:6} {cells}\")\n\ndef play(song):\n    seconds = 60 / song[\"tempo\"] / 2\n    for i in range(STEPS):\n        hits = [name for name, pat in song[\"tracks\"].items() if pat[i]]\n        print(\"  \".join(hits) if hits else \"-\")\n        time.sleep(seconds)\n    print(\"(done)\")\n\ndef toggle(song, track, step):\n    song[\"tracks\"][track][step] ^= 1   # ^= 1 flips 0<->1\n\ndef save(song, path):\n    with open(path, \"w\") as f:\n        json.dump(song, f)\n\ndef load(path):\n    with open(path, \"r\") as f:\n        return json.load(f)\n\ndef menu():\n    song = new_song()\n    while True:\n        show(song)\n        choice = input(\"\\n[p]lay [e]dit [t]empo [s]ave [l]oad [q]uit > \").strip().lower()\n        if choice == \"q\":\n            print(\"Bye!\"); break\n        elif choice == \"p\":\n            play(song)\n        elif choice == \"e\":\n            try:\n                track = input(\"track: \").strip()\n                step = int(input(f\"step (0-{STEPS - 1}): \"))\n                toggle(song, track, step)\n            except (ValueError, KeyError, IndexError):\n                print(\"Couldn't edit that — check the track name and step.\")\n        elif choice == \"t\":\n            try:\n                song[\"tempo\"] = int(input(\"new tempo (BPM): \"))\n            except ValueError:\n                print(\"Tempo must be a number.\")\n        elif choice == \"s\":\n            save(song, \"song.json\"); print(\"Saved to song.json\")\n        elif choice == \"l\":\n            try:\n                song = load(\"song.json\"); print(\"Loaded song.json\")\n            except FileNotFoundError:\n                print(\"No saved song yet.\")\n        else:\n            print(\"Didn't understand that.\")\n\nif __name__ == \"__main__\":\n    menu()\n```\n\n*(Verified: runs end-to-end under `python3` — shows, plays, toggles a step, changes tempo, saves, loads, quits.)*\n\n---\n\n## Stretch goals (each is a real \"level up\")\n\n- **A `Track` class (Ch6).** Turn each track into a `Track` object that owns its `name` and `pattern` and has `.toggle(step)` and `.is_hit(step)` methods. The song becomes a list of `Track`s. This is the Chapter 6 \"a class that owns its data\" idea applied to music.\n- **Verse and chorus.** Store several beats and a `Song` that plays them in an order — `verse, verse, chorus` — using a list and a loop.\n- **Generative fills.** Use `random.choice([0, 1])` (Ch7) to sprinkle random hits into a track, or `random.choice` on a scale list to add a melody line played with real notes.\n- **Real sound (free on a Mac, no install).** macOS has a built-in sound player called `afplay`. Drop three short `.wav` files (`kick.wav`, `snare.wav`, `hihat.wav`) into your folder, then `import subprocess` and, on each hit, launch the sound *without waiting* so the beat keeps its timing:\n  ```python\n  import subprocess\n  subprocess.Popen([\"afplay\", \"kick.wav\"])   # fires the sound and moves on\n  ```\n  Map each track name to its `.wav` file and call this in `play` instead of printing the name — now it actually drums, for free. (Using `Popen` rather than waiting is what lets several drums hit \"at once\" and keeps the loop on tempo.) Get the silent version working first, then add sound.\n- **Wider and longer.** Bump `STEPS` to 16, then to 32, and add a second bar.\n\n## Done when\n\nYour program shows a grid, plays it in time, lets you toggle cells and change tempo without crashing on bad input, and saves and loads a beat you made yourself. That's a real, complete program — the kind that lives in a folder and runs whenever you want it.\n"
    },
    {
      "id": "data-dashboard",
      "title": "The Data Dashboard",
      "order": 2,
      "body": "# Capstone Project — The Data Dashboard\n\nBuild a **dashboard** over a real dataset: a program that owns a set of numbers and shows them three ways — a summary, a chart, and a lookup — without crashing on a bad question. This is the most chart-and-analysis capstone, and it's the cleanest bridge toward real data science.\n\nSet up first with `CAPSTONE_00_SETUP.md`. Build this in `dashboard.py` and run it with `python3 dashboard.py`.\n\n---\n\n## What you're building\n\nPick a dataset you find interesting. Two good starters:\n\n- **A weather week** — each day of the week mapped to its high temperature.\n- **The solar system** — each planet mapped to its number of moons.\n\nYour program computes the **mean, min, and max**, draws a **bar chart** out of `#` characters right in the terminal, flags the entries **above average**, and answers **lookups** (\"what was Wednesday?\") — printing a friendly message instead of crashing when you ask for something that isn't there.\n\n## The data model\n\nOne dictionary, name → number (Chapter 4):\n\n```python\nWEATHER = {\"Mon\": 72, \"Tue\": 75, \"Wed\": 68, \"Thu\": 80, \"Fri\": 77, \"Sat\": 71, \"Sun\": 74}\n# or:\nMOONS = {\"Mercury\": 0, \"Venus\": 0, \"Earth\": 1, \"Mars\": 2,\n         \"Jupiter\": 95, \"Saturn\": 146, \"Uranus\": 28, \"Neptune\": 16}\n```\n\n---\n\n## Milestones (build in this order, run after each)\n\n**1 — Summarize.** Write `mean(xs)` and `summary(data)` that prints the mean, min, and max of the values. *Uses:* `sum`/`len`/`min`/`max` (Ch4), `round`, an f-string (Ch1). `min` and `max` already scan the whole list — don't wrap them in a loop.\n\n**2 — Chart it in text.** Write `bar_chart(data)` that prints one row per entry, where the bar is a run of `#` scaled so the biggest value fills a fixed width (say 20). The length of each bar is `round(value / biggest * 20)`. *Uses:* a dict loop, arithmetic, string repetition `\"#\" * n` (Ch1). This is your Chapter 4 bar chart, drawn without a graphics library.\n\n**3 — Find what stands out.** Write `hot_days(data)` (or `busy_planets`, etc.) that computes the average and prints every entry above it. *Uses:* the average, a `for`+`if` filter collecting names, `\", \".join(...)` to print them (Ch1/Ch7).\n\n**4 — Look it up safely.** Write `lookup(data)` that asks for a key and prints its value — but catches a missing key with `try`/`except KeyError as e` and prints `No data for <key>` using `e.args[0]` for a clean message (Ch8), not a crash.\n\n**5 — The menu.** Write `menu(data)`: a `while True` loop offering summary / bar / above-average / lookup / quit, reading a one-letter choice with `input()` (Ch2/Ch8).\n\n**6 — Make it yours.** Swap in a dataset *you* care about — your game scores over a week, hours of sleep, a sports team's points per game. As long as it's name → number, every function still works.\n\n---\n\n## Reference program (check yourself against this *after* you've tried)\n\n```python\nWEATHER = {\"Mon\": 72, \"Tue\": 75, \"Wed\": 68, \"Thu\": 80, \"Fri\": 77, \"Sat\": 71, \"Sun\": 74}\n\ndef mean(xs):\n    return round(sum(xs) / len(xs), 1)\n\ndef summary(data):\n    vals = list(data.values())\n    print(f\"Mean {mean(vals)}   Min {min(vals)}   Max {max(vals)}\")\n\ndef bar_chart(data, width=20):\n    hi = max(data.values())\n    for label, v in data.items():\n        n = round(v / hi * width)\n        print(f\"{label:4} {'#' * n} {v}\")\n\ndef hot_days(data):\n    avg = mean(list(data.values()))\n    days = [d for d, v in data.items() if v > avg]\n    print(f\"Above the {avg} average: {', '.join(days)}\")\n\ndef lookup(data):\n    day = input(\"Which entry? \").strip()\n    try:\n        print(f\"{day}: {data[day]}\")\n    except KeyError as e:\n        print(f\"No data for {e.args[0]}\")\n\ndef menu(data):\n    while True:\n        choice = input(\"\\n[s]ummary [b]ar [h]ot [l]ookup [q]uit > \").strip().lower()\n        if choice == \"q\":\n            print(\"Bye!\"); break\n        elif choice == \"s\":\n            summary(data)\n        elif choice == \"b\":\n            bar_chart(data)\n        elif choice == \"h\":\n            hot_days(data)\n        elif choice == \"l\":\n            lookup(data)\n        else:\n            print(\"?\")\n\nif __name__ == \"__main__\":\n    menu(WEATHER)\n```\n\n*(Verified under `python3`: summary → `Mean 73.9  Min 68  Max 80`; bar chart scales correctly; above-average → `Tue, Thu, Fri, Sun`; lookup `Wed` → `68`, lookup a missing key → `No data for <key>`.)*\n\n---\n\n## Stretch goals (each a real \"level up\")\n\n- **A relationship view (the interesting one).** Add a second measurement per entry — e.g., each song's BPM *and* its plays — and ask \"do they move together?\" Print them side by side sorted by one, and find the plays of the fastest song. This is the dot-plot idea from Chapter 4, in the terminal: it turns a table into a *question*.\n- **A `Station` class (Ch6).** Wrap the data and all these functions into a class that owns the dataset and has `.summary()`, `.chart()`, `.lookup(key)` methods — the \"a class that owns its data\" pattern made into a real tool.\n- **Save and load (Ch7).** Add `save`/`load` with JSON so you can edit the dataset and keep it between runs.\n- **Read a real file.** Put your data in a plain `data.txt` (one `name: value` per line) and parse it with the Chapter 7 text-splitting skills, so you can add entries without touching the code.\n- **Real graphs (needs an install).** Install matplotlib — on a Mac the reliable way is through Thonny: **Tools → Manage Packages → search `matplotlib` → Install** (plain `pip3 install matplotlib` can hit the \"externally-managed-environment\" error). Then `import matplotlib.pyplot as plt` and draw a real bar and line chart in a window with `plt.bar(...)`, `plt.plot(...)`, `plt.show()`. Get the text version working first — the matplotlib version is the same data, just prettier.\n\n## Done when\n\nYour program summarizes a dataset, charts it in the terminal, flags what's above average, answers lookups without crashing on a bad key, and works on data you chose yourself. Add the relationship view or matplotlib and you've built something that genuinely does data analysis.\n"
    },
    {
      "id": "data-analyzer",
      "title": "The Data Analyzer",
      "order": 3,
      "body": "# Capstone Project — The Data Analyzer\n\nBuild a tool that analyzes numbers **you** care about — your daily screen time, steps, hours of sleep, minutes practicing an instrument, a game's high scores. You type them in, and the program computes the stats, charts them, and flags what stands out. This is the most open-ended capstone: it's mostly *your* design, using the planning workflow from Chapter 8 for real.\n\nSet up first with `CAPSTONE_00_SETUP.md`. Build this in `analyzer.py` and run it with `python3 analyzer.py`.\n\n---\n\n## Plan before you type (this is the point)\n\nChapter 8 taught: read the spec, pull out the **verbs**, make each a function. The spec here is \"read some numbers, analyze them, show the result.\" Three verbs, three functions:\n\n- `read_numbers()` — collects the data from the user\n- `analyze(data)` — computes the stats (returns them; doesn't print)\n- `display(data)` — shows the summary, the chart, and the outliers\n\nThat's your whole call graph: `main` calls `read_numbers`, hands the result to `display`, which uses `analyze`. Write the three stubs *first*, then fill them one at a time, running after each. Don't type the whole thing and hope.\n\n---\n\n## Milestones (build in this order, run after each)\n\n**1 — Read the data robustly.** Write `read_numbers()`: a `while True` loop that reads a line, stops on `\"done\"`, converts each entry with `float(...)`, and catches a non-number with `try`/`except ValueError` so a typo doesn't crash the whole session — it just says \"try again.\" If nothing was entered, `raise ValueError(\"No data entered.\")` (Ch8). *Uses:* the input loop (Ch2/Ch8), `try`/`except`, `raise`, a list accumulator (Ch4).\n\n**2 — Analyze.** Write `analyze(data)` that **returns** a dict of `count`, `mean`, `min`, `max` (returns, doesn't print — that's `display`'s job). *Uses:* `sum`/`len`/`min`/`max` (Ch4), `round`, a returned dict.\n\n**3 — Chart it.** Write `bar_chart(data)` that prints one `#`-bar per value, scaled to the biggest (same trick as the Dashboard). *Uses:* `enumerate` to number the rows (Ch4), string repetition, arithmetic.\n\n**4 — Flag the outliers.** Write `outliers(data)` that returns the values sitting far from the average — more than 40% of the data's spread away from the mean. *Uses:* the mean, `max - min` for the spread, a `for`+`if` filter (or a comprehension, Ch8).\n\n**5 — Put it together.** Write `display(data)` (prints the summary line, the chart, and any outliers) and `main()` (reads, catches the empty-data error, displays). *Uses:* function composition (Ch3/Ch5), `try`/`except` at the top level.\n\n**6 — Make it yours.** Run it on real numbers from your own life for a week and see what the chart and the outliers tell you. That's data analysis — on data that's actually yours.\n\n---\n\n## Reference program (check yourself against this *after* you've tried)\n\n```python\ndef read_numbers():\n    print(\"Enter numbers, one per line. Type 'done' to finish.\")\n    data = []\n    while True:\n        line = input(\"> \").strip()\n        if line == \"done\":\n            break\n        try:\n            data.append(float(line))\n        except ValueError:\n            print(\"Not a number — try again.\")\n    if not data:\n        raise ValueError(\"No data entered.\")\n    return data\n\ndef analyze(data):\n    return {\"count\": len(data),\n            \"mean\": round(sum(data) / len(data), 1),\n            \"min\": min(data),\n            \"max\": max(data)}\n\ndef outliers(data):\n    m = sum(data) / len(data)\n    spread = max(data) - min(data)\n    return [x for x in data if spread and abs(x - m) > spread * 0.4]\n\ndef bar_chart(data, width=20):\n    hi = max(data)\n    for i, v in enumerate(data):\n        n = round(v / hi * width)\n        print(f\"{i:3} {'#' * n} {v}\")\n\ndef display(data):\n    s = analyze(data)\n    print(f\"\\nCount {s['count']}  Mean {s['mean']}  Min {s['min']}  Max {s['max']}\")\n    bar_chart(data)\n    outs = outliers(data)\n    if outs:\n        print(\"Outliers:\", outs)\n\ndef main():\n    try:\n        data = read_numbers()\n    except ValueError as e:\n        print(e.args[0])\n        return\n    display(data)\n\nif __name__ == \"__main__\":\n    main()\n```\n\n*(Verified under `python3`: entering `30, 32, 31, 95, nope, 29, 33, done` rejects `nope`, reports `Count 6  Mean 41.7  Min 29.0  Max 95.0`, draws the bars, and flags `Outliers: [95.0]`.)*\n\n---\n\n## Stretch goals (each a real \"level up\")\n\n- **Test it (Ch8).** Write `test_analyze()` with a few `assert` checks on a known list (`analyze([2, 4, 6])[\"mean\"] == 4.0`, with the message form). Run it before trusting the tool.\n- **Save your data (Ch7).** Add `save`/`load` with JSON so you can add to the same dataset day after day instead of re-typing it.\n- **Read a CSV file.** Keep your numbers in `data.csv`, read the file line by line (Ch7), split on commas, and analyze — so the tool works on data you exported from somewhere else.\n- **More statistics.** Add the *median* (sort the list, take the middle) and a count of values above a threshold you ask the user for.\n- **Real graphs (needs an install).** Install matplotlib through Thonny (**Tools → Manage Packages → `matplotlib` → Install** — more reliable on a Mac than `pip3 install matplotlib`, which can hit the \"externally-managed-environment\" error), then draw a real bar or line chart with `plt.bar(...)` / `plt.plot(...)` / `plt.show()`. Same numbers, real picture.\n\n## Done when\n\nYour program reads numbers without crashing on a typo, refuses to run on empty input with a clear message, reports the stats, charts them, flags the outliers, and does it on data you chose. You planned it into three functions before writing logic — which is exactly how real programs get built.\n"
    }
  ];

/* ===== reference-panel.js ===== */
/* reference-panel.js — always-available reference chart panel (report Part 5).

   Self-contained: injects a fixed "Reference" button + an accessible modal
   dialog that renders window.CODELAB.reference (the 8 tables from
   reference.js). Self-initialises on DOM ready; does not depend on engine.js
   calling it.

   engine.js's buildRefTable() is PRIVATE to that module (only CL.engine is
   exposed), and per instructions we do not edit engine.js to export it — so
   the { title, head, rows } shape is rendered locally below. Globbed into the
   build by build.js like every other src/js file (no build-config change). */

(function () {
  "use strict";

  /* ---- minimal inline markup: escape, then `code` and **bold** (the only
     markup the reference cells use; there are no [[term]] links) ---- */
  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    return esc(s)
      .replace(/`([^`]+)`/g, function (_, c) { return "<code>" + c + "</code>"; })
      .replace(/\*\*([^*]+)\*\*/g, function (_, c) { return "<strong>" + c + "</strong>"; });
  }

  /* ---- render one { title, head, rows } table locally ---- */
  function renderTable(t) {
    var wrap = document.createElement("div");
    wrap.className = "cl-ref-table-wrap";
    if (t.title) {
      var cap = document.createElement("div");
      cap.className = "cl-ref-title";
      cap.innerHTML = inline(t.title);
      wrap.appendChild(cap);
    }
    var tbl = document.createElement("table");
    tbl.className = "cl-ref-table";
    if (t.head) {
      var thead = document.createElement("thead");
      var htr = document.createElement("tr");
      t.head.forEach(function (h) {
        var th = document.createElement("th");
        th.innerHTML = inline(h);
        htr.appendChild(th);
      });
      thead.appendChild(htr);
      tbl.appendChild(thead);
    }
    var tbody = document.createElement("tbody");
    (t.rows || []).forEach(function (row) {
      var tr = document.createElement("tr");
      row.forEach(function (cell) {
        var td = document.createElement("td");
        td.innerHTML = inline(cell);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    return wrap;
  }

  /* ---- scoped styles (theme-aware via the app's CSS custom properties) ---- */
  var STYLE = [
    "#cl-ref-btn{position:fixed;right:16px;bottom:16px;z-index:9998;",
    "  font:600 14px/1 system-ui,sans-serif;padding:10px 16px;border:none;border-radius:999px;",
    "  background:var(--accent,#c0392b);color:#fff;cursor:pointer;",
    "  box-shadow:0 2px 10px rgba(0,0,0,.3)}",
    "#cl-ref-btn:hover{filter:brightness(1.08)}",
    "#cl-ref-btn:focus-visible{outline:3px solid var(--text,#000);outline-offset:2px}",
    "#cl-ref-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);",
    "  display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow:auto}",
    "#cl-ref-overlay[hidden]{display:none}",
    ".cl-ref-dialog{background:var(--panel,#fff);color:var(--text,#111);",
    "  width:100%;max-width:900px;max-height:88vh;overflow:auto;border-radius:12px;",
    "  box-shadow:0 10px 40px rgba(0,0,0,.4);padding:20px 22px 26px;",
    "  font:14px/1.5 system-ui,sans-serif}",
    ".cl-ref-dialog:focus{outline:none}",
    ".cl-ref-header{position:sticky;top:-20px;background:var(--panel,#fff);",
    "  display:flex;align-items:center;justify-content:space-between;gap:12px;",
    "  padding:2px 0 10px;margin:-2px 0 8px;border-bottom:1px solid var(--muted,#ccc)}",
    ".cl-ref-h{margin:0;font-size:20px;font-weight:700}",
    ".cl-ref-close{font:600 13px/1 system-ui,sans-serif;padding:8px 14px;border-radius:8px;",
    "  border:1px solid var(--muted,#999);background:transparent;color:inherit;cursor:pointer}",
    ".cl-ref-close:hover{background:rgba(128,128,128,.15)}",
    ".cl-ref-close:focus-visible{outline:3px solid var(--accent,#c0392b);outline-offset:2px}",
    ".cl-ref-table-wrap{margin:0 0 20px;overflow-x:auto}",
    ".cl-ref-title{font-weight:600;font-size:13px;margin:0 0 6px;color:var(--text,#111);opacity:.85}",
    ".cl-ref-table{border-collapse:collapse;width:100%;font-size:13px}",
    ".cl-ref-table th,.cl-ref-table td{text-align:left;padding:6px 12px 6px 0;",
    "  border-bottom:1px solid var(--muted,#e2e2e2);vertical-align:top}",
    ".cl-ref-table th{font-weight:700;white-space:nowrap}",
    ".cl-ref-table code{font-family:ui-monospace,Menlo,Consolas,monospace;",
    "  color:var(--accent,#c0392b);font-size:.92em}",
  ].join("");

  var btn, overlay, dialog, lastFocus;

  function focusable() {
    return Array.prototype.slice
      .call(dialog.querySelectorAll("button,[href],input,[tabindex]:not([tabindex='-1'])"))
      .filter(function (e) { return !e.disabled && e.offsetParent !== null; });
  }

  function onKey(e) {
    if (e.key === "Escape") { e.preventDefault(); close(); return; }
    if (e.key === "Tab") {
      var f = focusable();
      if (!f.length) { e.preventDefault(); dialog.focus(); return; }
      var first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }

  function buildBody() {
    var body = dialog.querySelector(".cl-ref-body");
    body.innerHTML = "";
    var data = (window.CODELAB && window.CODELAB.reference) || [];
    if (!data.length) {
      var p = document.createElement("p");
      p.textContent = "Reference chart not loaded.";
      body.appendChild(p);
      return;
    }
    data.forEach(function (t) { body.appendChild(renderTable(t)); });
  }

  function open() {
    if (!overlay.hidden) return;
    lastFocus = document.activeElement;
    buildBody();
    overlay.hidden = false;
    btn.setAttribute("aria-expanded", "true");
    var closeBtn = dialog.querySelector(".cl-ref-close");
    (closeBtn || dialog).focus();
    document.addEventListener("keydown", onKey, true);
  }

  function close() {
    if (overlay.hidden) return;
    overlay.hidden = true;
    btn.setAttribute("aria-expanded", "false");
    document.removeEventListener("keydown", onKey, true);
    if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
    else btn.focus();
  }

  function init() {
    if (document.getElementById("cl-ref-btn")) return; // idempotent

    var style = document.createElement("style");
    style.textContent = STYLE;
    document.head.appendChild(style);

    btn = document.createElement("button");
    btn.id = "cl-ref-btn";
    btn.type = "button";
    btn.textContent = "Reference";
    btn.setAttribute("aria-haspopup", "dialog");
    btn.setAttribute("aria-expanded", "false");
    btn.addEventListener("click", open); // Enter/Space fire click natively
    document.body.appendChild(btn);

    overlay = document.createElement("div");
    overlay.id = "cl-ref-overlay";
    overlay.hidden = true;
    overlay.addEventListener("click", function (e) { if (e.target === overlay) close(); });

    dialog = document.createElement("div");
    dialog.className = "cl-ref-dialog";
    dialog.setAttribute("role", "dialog");
    dialog.setAttribute("aria-modal", "true");
    dialog.setAttribute("aria-labelledby", "cl-ref-h");
    dialog.tabIndex = -1;

    var header = document.createElement("div");
    header.className = "cl-ref-header";
    var h = document.createElement("h2");
    h.className = "cl-ref-h";
    h.id = "cl-ref-h";
    h.textContent = "Reference";
    var closeBtn = document.createElement("button");
    closeBtn.type = "button";
    closeBtn.className = "cl-ref-close";
    closeBtn.textContent = "Close";
    closeBtn.setAttribute("aria-label", "Close reference chart");
    closeBtn.addEventListener("click", close);
    header.appendChild(h);
    header.appendChild(closeBtn);

    var body = document.createElement("div");
    body.className = "cl-ref-body";

    dialog.appendChild(header);
    dialog.appendChild(body);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
