- name: voice-cloner
  type: tool
  version: 0.3.0
  path: tools/writing/voice-cloner
  description: A self-contained CLI that analyzes writing samples and generates a
    Claude Code skill capturing the author's unique voice. Uses `claude -p` under
    the hood (Max plan, no API key). Reads .md, .txt, .docx, .pdf samples, computes
    ~50 deterministic metrics, and extracts qualitative patterns across 6 dimensions.
    Code measures all numbers; LLM describes only qualitative patterns — zero overlap,
    zero conflicts.
  tags:
  - writing
  - voice
  - style
  - tone
  - skill-generation
  - analysis
  - stylometrics
  compatibility:
    languages:
    - python
